<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- 上述3个meta标签*必须*放在最前面，任何其他内容都*必须*跟随其后！ -->
    <meta name="description" content="">
    <meta name="author" content="">
    <style type="text/css">
        html,body{ 
            overflow-x: hidden; overflow-y: hidden; 
            }
    	*{
    		margin: 0;
    		padding: 0;
    		font-family: "微软雅黑";
    	}
        .net-error{
            width: 428px;
            height: 390px;
            background: #ffffff;
        }
        .err-icon{
            width: 100px;
            height: 150px;
            line-height: 150px;
            vertical-align: middle;
            display: table-cell;
            margin: 0 auto;
        }
        .caption{
            font-size: 30px;
            color: #666;
            text-align: center;
            margin-top: 20px;
        }
        .sub-caption{
            font-size: 14px;
            color: #999;
            text-align: center;
            margin-top: 14px;
        }
    </style>
</head>
<body>
	<div class="net-error">
        <div class="err-icon"></div>
        <div class="caption">
            不支持IE6/7用户登录
        </div>
        <div class="sub-caption">
            请升级IE浏览器后再试！
        </div>
    </div>
</body>
