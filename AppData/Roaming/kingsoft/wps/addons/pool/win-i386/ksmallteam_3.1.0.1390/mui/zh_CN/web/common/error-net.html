<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>加载失败</title>
    <style type="text/css">
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #fff;
      }
      .error-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        flex-direction: column;
      }

      .desc {
        color: #444e63;
        font-size: 14px;
        height: 22px;
        line-height: 22px;
        margin: 12px 0;
      }
      .network {
        display: flex;
        width: 80px;
        height: 80px;
        background-size: 100% 100%;
        background-image: url('./img/error-net.svg');
      }

      .button {
        width: 70px;
        height: 24px;
        display: flex;
        background-color: #417ff9;
        align-items: center;
        justify-content: center;
        border-radius: 2px;
        cursor: pointer;
      }

      .button img {
        height: 16px;
        width: 16px;
        display: flex;
        margin-right: 6px;
      }

      .button span {
        color: #fff;
        font-size: 12px;
      }

      .button:hover,
      .button:focus {
        background-color: #608dfa;
      }

      .button:active {
        background-color: #1f72f1;
      }
    </style>
  </head>
  <body>
    <div class="error-wrap">
      <div class="network"></div>
      <p class="desc">网络错误，加载失败</p>
      <div class="button" id="Retry">
        <img src="./img/reload.svg" />
        <span>重试</span>
      </div>
    </div>
    <script>
      'use strict'
      var jsAsynCall = function (jsonIn) {
        window.cefQuery({request:`fromJSAsynCall("${jsonIn}")`})
      }
      
      var reload = function () {
        var invokeParams = {
          method: 'reload',
          params: ''
        }
        var jsonIn = JSON.stringify(invokeParams)
        jsAsynCall(jsonIn)
      }

      var el = document.getElementById('Retry')
      el.onclick = reload

      window.addEventListener('online', reload)
    </script>
  </body>
</html>
