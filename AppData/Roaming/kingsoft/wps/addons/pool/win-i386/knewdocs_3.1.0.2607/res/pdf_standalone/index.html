<!DOCTYPE html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>pdfcode</title><link href=./css/app.css rel=stylesheet></head><body><div id=App></div><script type=text/javascript src=./js/wps_perf_client.js></script><script>document.addEventListener('DOMContentLoaded', function() {
                var appName = 'vip_pc_new_pdf';
                window.WebVitalsWithClient &&
                    (window.webVitals = new WebVitalsWithClient({

                        ],
                        complete: function(perfResult) {
                            console.log('性能SDK===========')
                            console.log(perfResult);
                            // todo: 业务逻辑
                        }
                    }));
            });</script><script type=text/javascript src=./js/manifest.js></script><script type=text/javascript src=./js/common.js></script><script type=text/javascript src=./js/app.js></script></body></html>
