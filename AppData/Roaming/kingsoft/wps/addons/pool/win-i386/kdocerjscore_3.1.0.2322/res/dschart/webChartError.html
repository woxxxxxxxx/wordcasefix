<script>

const stringFromCharCode = String.fromCharCode

function readContinuationByte() {
	if (byteIndex >= byteCount) {
		throw Error('Invalid byte index')
	}

	const continuationByte = byteArray[byteIndex] & 0xff
	byteIndex++

	if ((continuationByte & 0xc0) == 0x80) {
		return continuationByte & 0x3f
	}

	// If we end up here, it’s not a continuation byte
	throw Error('Invalid continuation byte')
}

function decodeSymbol() {
	let byte1
	let byte2
	let byte3
	let byte4
	let codePoint

	if (byteIndex > byteCount) {
		throw Error('Invalid byte index')
	}

	if (byteIndex == byteCount) {
		return false
	}

	// Read first byte
	// eslint-disable-next-line prefer-const
	byte1 = byteArray[byteIndex] & 0xff
	byteIndex++

	// 1-byte sequence (no continuation bytes)
	if ((byte1 & 0x80) == 0) {
		return byte1
	}

	// 2-byte sequence
	if ((byte1 & 0xe0) == 0xc0) {
		byte2 = readContinuationByte()
		codePoint = ((byte1 & 0x1f) << 6) | byte2
		if (codePoint >= 0x80) {
			return codePoint
		} else {
			throw Error('Invalid continuation byte')
		}
	}

	// 3-byte sequence (may include unpaired surrogates)
	if ((byte1 & 0xf0) == 0xe0) {
		byte2 = readContinuationByte()
		byte3 = readContinuationByte()
		codePoint = ((byte1 & 0x0f) << 12) | (byte2 << 6) | byte3
		if (codePoint >= 0x0800) {
			checkScalarValue(codePoint)
			return codePoint
		} else {
			throw Error('Invalid continuation byte')
		}
	}

	// 4-byte sequence
	if ((byte1 & 0xf8) == 0xf0) {
		byte2 = readContinuationByte()
		byte3 = readContinuationByte()
		byte4 = readContinuationByte()
		codePoint = ((byte1 & 0x07) << 0x12) | (byte2 << 0x0c) | (byte3 << 0x06) | byte4
		if (codePoint >= 0x010000 && codePoint <= 0x10ffff) {
			return codePoint
		}
	}

	throw Error('Invalid UTF-8 detected')
}

function createByte(codePoint, shift) {
	return stringFromCharCode(((codePoint >> shift) & 0x3f) | 0x80)
}

function encodeCodePoint(codePoint) {
	if ((codePoint & 0xffffff80) == 0) {
		// 1-byte sequence
		return stringFromCharCode(codePoint)
	}
	let symbol = ''
	if ((codePoint & 0xfffff800) == 0) {
		// 2-byte sequence
		symbol = stringFromCharCode(((codePoint >> 6) & 0x1f) | 0xc0)
	} else if ((codePoint & 0xffff0000) == 0) {
		// 3-byte sequence
		checkScalarValue(codePoint)
		symbol = stringFromCharCode(((codePoint >> 12) & 0x0f) | 0xe0)
		symbol += createByte(codePoint, 6)
	} else if ((codePoint & 0xffe00000) == 0) {
		// 4-byte sequence
		symbol = stringFromCharCode(((codePoint >> 18) & 0x07) | 0xf0)
		symbol += createByte(codePoint, 12)
		symbol += createByte(codePoint, 6)
	}
	symbol += stringFromCharCode((codePoint & 0x3f) | 0x80)
	return symbol
}

function ucs2encode(array) {
	const length = array.length
	let index = -1
	let value
	let output = ''
	while (++index < length) {
		value = array[index]
		if (value > 0xffff) {
			value -= 0x10000
			output += stringFromCharCode(((value >>> 10) & 0x3ff) | 0xd800)
			value = 0xdc00 | (value & 0x3ff)
		}
		output += stringFromCharCode(value)
	}
	return output
}

// Taken from https://mths.be/punycode
function ucs2decode(string) {
	let output = new Array(string.length)
	let counter = 0
	const length = string.length
	let value
	let extra
	let index = 0
	while (counter < length) {
		value = string.charCodeAt(counter++)
		if (value >= 0xd800 && value <= 0xdbff && counter < length) {
			// high surrogate, and there is a next character
			extra = string.charCodeAt(counter++)
			if ((extra & 0xfc00) == 0xdc00) {
				// low surrogate
				output[index] = ((value & 0x3ff) << 10) + (extra & 0x3ff) + 0x10000
			} else {
				// unmatched surrogate; only append this code unit, in case the next
				// code unit is the high surrogate of a surrogate pair
				output[index] = value
				counter--
			}
		} else {
			output[index] = value
		}
		index++
	}
	output = output.slice(0, index)
	return output
}

function utf8encode(string) {
	const codePoints = ucs2decode(string)
	const length = codePoints.length
	let index = -1
	let codePoint
	let byteString = ''
	while (++index < length) {
		codePoint = codePoints[index]
		byteString += encodeCodePoint(codePoint)
	}
	return byteString
}

function utf8decode(byteString) {
	byteArray = ucs2decode(byteString)
	byteCount = byteArray.length
	byteIndex = 0
	const codePoints = []
	let tmp = decodeSymbol()
	while (tmp !== false) {
		// eslint-disable-next-line
    codePoints.push(tmp);
		tmp = decodeSymbol()
	}
	return ucs2encode(codePoints)
}

function b64DecodeUnicode(str) {
	//base64解码
	return utf8decode(atob(str))
}

function b64EncodeUnicode(str) {
	//base64编码
	return btoa(utf8encode(str))
}


/**
 * 调用客户端API
 * @param {string} methodName 调用方法名称
 * @param {object} args 调用传入参数
 * @param {Function} callback 回调函数
 */
const jsAsynCall = (methodName, args, resultFilter, callback, needFullRes = '') => {
    const isWeb1 = window.wps.Docer && window.wps.DocerChart
    let Docer = {}
    if (!isWeb1) {
        Docer = window.Extention.DocerV2.DocerChart
    } else {
        Docer = window.wps.Docer
    }

    const defer = new Promise((resolve, reject) => {
        const invokeParams = {
            method: methodName,
            params: args
        }
        if (invokeParams.params && invokeParams.params._config) {
            if (invokeParams.params._config.isChangeDot) {
                methodName = methodName.replace(/\./g, '_')
            }
            delete invokeParams.params._config
        }
        const callbackName = methodName?.split('.')?.join('') + '_async_callback_' + setTimeout('1')
        window[callbackName] = (res) => {
            delete window[callbackName]
            const json = JSON.parse(b64DecodeUnicode(res))
            const result = needFullRes ? json : json.result
            //console.log(callbackName, json)

            callback && callback(json)

            if (json.callstatus === 'ok') {
                resolve(resultFilter ? resultFilter(result) : result)
            } else {
                reject({ result: json.errormsg, method: methodName })
            }
        }
        invokeParams['callback'] = callbackName
        const jsonIn = b64EncodeUnicode(JSON.stringify(invokeParams))
        console.warn(`调用接口jsAsynCall，参数`, invokeParams)

        Docer?.jsAsynCall?.(jsonIn)
    })
    return defer
}

const readFileFromFileSystem = (path) => {
	// 递归读取完整文件（每次只能读100K）
	let content = ''
	let finish = false
	let offset = 0
	while (!finish) {
		const data = Extention.Common.File.read({ path, mode: 'rb', offset: offset })
		if (data?.code && data?.result?.result) {
			finish = data.result.isFinish
			try {
				offset += data.result.length
				if (data.result.base64) content += atob(data.result.result)
				else content += data.result.result
			} catch (error) {
				break
			}	
		} else {
			break
		}
	}
	return btoa(content)
}
