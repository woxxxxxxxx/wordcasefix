<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter — Free Online JSON Formatter & Validator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #f4f5f7;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .page-wrap { display: flex; flex: 1; max-width: 1280px; margin: 0 auto; width: 100%; }
  .main-area { flex: 1; min-width: 0; padding: 32px 24px 48px; }
  .sidebar { width: 200px; flex-shrink: 0; padding: 32px 16px; }
  header { text-align: center; margin-bottom: 16px; }
  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.3px; }
  header p { color: #555; font-size: 15px; margin-top: 4px; }
  .ad-slot { position: relative; background: #e8e9ed; border: 1px dashed #bbb; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #888; font-size: 13px; }
  .ad-top { width: 100%; height: 90px; margin-bottom: 24px; }
  .ad-side { width: 100%; min-height: 300px; margin-bottom: 16px; }
  .ad-label { position: absolute; top: 6px; left: 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 6px rgba(0,0,0,.04); padding: 28px 32px 32px; }
  .input-group { margin-bottom: 14px; }
  .input-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #555; text-transform: uppercase; letter-spacing: .3px; }
  textarea { width: 100%; padding: 12px 14px; font-size: 13px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; line-height: 1.5; border: 1.5px solid #d0d5dd; border-radius: 8px; resize: vertical; transition: border-color .2s, box-shadow .2s; }
  textarea:focus { outline: none; border-color: #5b5bd6; box-shadow: 0 0 0 3px rgba(91,91,214,.15); }
  textarea::placeholder { color: #bbb; }
  #jsonInput { height: 200px; }
  #jsonOutput { height: 280px; background: #f8f9fc; }
  .btn-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 10px 26px; font-size: 14px; font-weight: 600; color: #fff; background: #5b5bd6; border: none; border-radius: 8px; cursor: pointer; transition: background .2s, transform .1s; }
  .btn-primary:hover { background: #4a4ac2; }
  .btn-primary:active { transform: scale(.97); }
  .btn-secondary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; font-size: 13px; font-weight: 600; color: #555; background: #f0f0f5; border: 1.5px solid #d0d5dd; border-radius: 8px; cursor: pointer; transition: background .15s, color .15s; }
  .btn-secondary:hover { background: #e4e4ef; color: #1a1a2e; }
  .btn-secondary.copied { background: #d4edda; border-color: #8cc99c; color: #155724; }
  .indent-options { display: flex; align-items: center; gap: 8px; }
  .indent-options label { font-size: 13px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .3px; }
  .indent-options select { padding: 8px 10px; font-size: 13px; border: 1.5px solid #d0d5dd; border-radius: 6px; outline: none; }
  .indent-options select:focus { border-color: #5b5bd6; }
  .status-bar { font-size: 13px; color: #888; margin-top: 6px; min-height: 20px; }
  .status-bar .valid { color: #22c55e; font-weight: 600; }
  .status-bar .invalid { color: #ef4444; font-weight: 600; }
  footer { text-align: center; padding: 24px 16px 32px; font-size: 13px; color: #999; }
  @media (max-width: 820px) { .sidebar { display: none; } .main-area { padding: 20px 16px 36px; } .card { padding: 20px; } }
  @media (max-width: 600px) { header h1 { font-size: 22px; } .btn-primary, .btn-secondary { width: 100%; justify-content: center; } .btn-row { flex-direction: column; align-items: stretch; } textarea { font-size: 12px; } }
</style>
</head>
<body>
<div class="ad-slot ad-top"><span class="ad-label">Advertisement</span></div>
<div class="page-wrap">
  <main class="main-area">
    <header><h1>JSON Formatter</h1><p>Format, validate, and beautify your JSON data.</p></header>
    <div class="ad-slot ad-top" style="height:70px;margin-bottom:20px;"><span class="ad-label">Advertisement</span></div>
    <div class="card">
      <div class="input-group"><label for="jsonInput">Input JSON</label><textarea id="jsonInput" placeholder='Paste your JSON here, e.g. {"name":"John","age":30}' spellcheck="false"></textarea></div>
      <div class="btn-row">
        <button class="btn-primary" id="formatBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg> Format & Validate</button>
        <button class="btn-secondary" id="minifyBtn">Minify</button>
        <button class="btn-secondary" id="copyBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy</button>
        <div class="indent-options"><label>Indent</label><select id="indentSize"><option value="2">2 spaces</option><option value="4" selected>4 spaces</option><option value="tab">Tab</option></select></div>
      </div>
      <div class="input-group"><label for="jsonOutput">Formatted JSON</label><textarea id="jsonOutput" placeholder="Formatted JSON will appear here…" spellcheck="false" readonly></textarea></div>
      <div class="status-bar" id="statusBar"><span>Enter JSON and click <strong>Format &amp; Validate</strong>.</span></div>
    </div>
  </main>
  <aside class="sidebar">
    <div class="ad-slot ad-side"><span class="ad-label">Advertisement</span></div>
    <div class="ad-slot ad-side" style="min-height:250px;"><span class="ad-label">Advertisement</span></div>
  </aside>
</div>
<footer>JSON Formatter &mdash; Free online JSON formatter and validator</footer>
<script>
(function() {
  const jsonInput = document.getElementById('jsonInput');
  const jsonOutput = document.getElementById('jsonOutput');
  const formatBtn = document.getElementById('formatBtn');
  const minifyBtn = document.getElementById('minifyBtn');
  const copyBtn = document.getElementById('copyBtn');
  const indentSize = document.getElementById('indentSize');
  const statusBar = document.getElementById('statusBar');

  let lastValid = '';

  function formatJSON(minify) {
    const raw = jsonInput.value.trim();
    if (!raw) {
      statusBar.innerHTML = '<span>Please enter JSON to format.</span>';
      jsonOutput.value = '';
      return;
    }
    try {
      const parsed = JSON.parse(raw);
      const indent = indentSize.value === 'tab' ? '\t' : parseInt(indentSize.value, 10);
      const formatted = minify ? JSON.stringify(parsed) : JSON.stringify(parsed, null, indent);
      jsonOutput.value = formatted;
      lastValid = formatted;
      statusBar.innerHTML = '<span class="valid">✓ Valid JSON</span> — ' + raw.length + ' chars → ' + formatted.length + ' chars';
    } catch (e) {
      jsonOutput.value = '';
      statusBar.innerHTML = '<span class="invalid">✗ Invalid JSON</span> — ' + e.message;
    }
  }

  formatBtn.addEventListener('click', function() { formatJSON(false); });
  minifyBtn.addEventListener('click', function() { formatJSON(true); });

  copyBtn.addEventListener('click', function() {
    const text = jsonOutput.value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
      const orig = copyBtn.innerHTML;
      copyBtn.innerHTML = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(function() { copyBtn.innerHTML = orig; copyBtn.classList.remove('copied'); }, 1800);
    });
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); formatJSON(false); }
  });
})();
</script>
</body>
</html>
