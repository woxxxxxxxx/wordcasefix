<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer — Free Online Countdown Timer</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f4f5f7;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column}
  .page-wrap{display:flex;flex:1;max-width:1280px;margin:0 auto;width:100%}
  .main-area{flex:1;min-width:0;padding:32px 24px 48px}
  .sidebar{width:200px;flex-shrink:0;padding:32px 16px}
  header{text-align:center;margin-bottom:16px}
  header h1{font-size:28px;font-weight:700;letter-spacing:-0.3px}
  header p{color:#555;font-size:15px;margin-top:4px}
  .ad-slot{position:relative;background:#e8e9ed;border:1px dashed #bbb;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px}
  .ad-top{width:100%;height:90px;margin-bottom:24px}
  .ad-side{width:100%;min-height:300px;margin-bottom:16px}
  .ad-label{position:absolute;top:6px;left:10px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#999}
  .card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 6px rgba(0,0,0,.04);padding:28px 32px 32px}
  .input-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;justify-content:center}
  .input-row .field{min-width:70px;flex:1}
  .field label{display:block;font-weight:600;font-size:11px;margin-bottom:3px;color:#555;text-transform:uppercase;letter-spacing:.3px;text-align:center}
  .field input{width:100%;padding:10px;font-size:20px;font-weight:700;text-align:center;border:1.5px solid #d0d5dd;border-radius:8px;outline:none;transition:border-color .2s,box-shadow .2s}
  .field input:focus{border-color:#5b5bd6;box-shadow:0 0 0 3px rgba(91,91,214,.15)}
  .timer-display{text-align:center;padding:20px 0 16px}
  .countdown-time{font-size:72px;font-weight:800;font-family:'SF Mono','Fira Code','Consolas',monospace;color:#1a1a2e;letter-spacing:4px;line-height:1.1}
  .countdown-time.running{color:#5b5bd6}
  .countdown-time.finished{color:#ef4444}
  .countdown-time .small{font-size:28px}
  .btn-group{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}
  .btn-start,.btn-stop,.btn-reset{padding:12px 36px;font-size:15px;font-weight:700;border:none;border-radius:50px;cursor:pointer;transition:background .2s,transform .1s}
  .btn-start{background:#22c55e;color:#fff}.btn-start:hover{background:#1da34e}
  .btn-stop{background:#ef4444;color:#fff}.btn-stop:hover{background:#dc2626}
  .btn-reset{background:#f0f0f5;color:#555;border:1.5px solid #d0d5dd}.btn-reset:hover{background:#e4e4ef;color:#1a1a2e}
  .btn-start:active,.btn-stop:active,.btn-reset:active{transform:scale(.96)}
  .btn-start:disabled,.btn-stop:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .alarm-text{text-align:center;font-size:16px;font-weight:700;color:#ef4444;min-height:28px;padding-top:4px}
  .preset-group{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .preset-btn{padding:6px 16px;font-size:12px;font-weight:600;color:#555;background:#f0f0f5;border:1.5px solid #d0d5dd;border-radius:20px;cursor:pointer;transition:background .15s,color .15s}
  .preset-btn:hover{background:#e4e4ef;color:#5b5bd6;border-color:#5b5bd6}
  footer{text-align:center;padding:24px 16px 32px;font-size:13px;color:#999}
  @media(max-width:820px){.sidebar{display:none}.main-area{padding:20px 16px 36px}.card{padding:20px}}
  @media(max-width:600px){header h1{font-size:22px}.countdown-time{font-size:48px;letter-spacing:2px}.countdown-time .small{font-size:20px}.input-row .field{min-width:60px}}
.navbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 24px;background:#fff;border-bottom:1.5px solid #e8e9ed;flex-shrink:0}.navbar .logo{font-size:18px;font-weight:800;color:#5b5bd6;text-decoration:none;letter-spacing:-.3px}.navbar .nav-links{display:flex;gap:18px;align-items:center}.navbar .nav-links a{font-size:13px;font-weight:600;color:#555;text-decoration:none;transition:color .15s}.navbar .nav-links a:hover{color:#5b5bd6}@media(max-width:600px){.navbar .nav-links{display:none}}</style>
</head>
<body>
<nav class="navbar"><a class="logo" href="/">WordCaseFix</a><div class="nav-links"><a href="/case-converter.html">Case Converter</a><a href="/word-counter.html">Word Counter</a><a href="/password-generator.html">Password Generator</a><a href="/unit-converter.html">Unit Converter</a></div></nav>
<div class="ad-slot ad-top"><span class="ad-label">Advertisement</span></div>
<div class="page-wrap">
<main class="main-area">
<header><h1>Countdown Timer</h1><p>Set a countdown with hours, minutes, and seconds.</p></header>
<div class="ad-slot ad-top" style="height:70px;margin-bottom:20px;"><span class="ad-label">Advertisement</span></div>
<div class="card">
<div class="preset-group">
<span class="preset-btn" data-h="0" data-m="1" data-s="0">1 min</span>
<span class="preset-btn" data-h="0" data-m="3" data-s="0">3 min</span>
<span class="preset-btn" data-h="0" data-m="5" data-s="0">5 min</span>
<span class="preset-btn" data-h="0" data-m="10" data-s="0">10 min</span>
<span class="preset-btn" data-h="0" data-m="15" data-s="0">15 min</span>
<span class="preset-btn" data-h="0" data-m="30" data-s="0">30 min</span>
<span class="preset-btn" data-h="1" data-m="0" data-s="0">1 hour</span>
</div>
<div class="input-row">
<div class="field"><label>Hours</label><input type="number" id="hours" value="0" min="0" max="99"></div>
<div class="field"><label>Minutes</label><input type="number" id="minutes" value="5" min="0" max="59"></div>
<div class="field"><label>Seconds</label><input type="number" id="seconds" value="0" min="0" max="59"></div>
</div>
<div class="timer-display">
<div class="countdown-time" id="countdownDisplay">00:05:00</div>
</div>
<div class="btn-group">
<button class="btn-start" id="startBtn">▶ Start</button>
<button class="btn-stop" id="stopBtn" disabled>■ Stop</button>
<button class="btn-reset" id="resetBtn">↺ Reset</button>
</div>
<div class="alarm-text" id="alarmText"></div>
</div>
</main>
<aside class="sidebar">
<div class="ad-slot ad-side"><span class="ad-label">Advertisement</span></div>
<div class="ad-slot ad-side" style="min-height:250px;"><span class="ad-label">Advertisement</span></div>
</aside>
</div>
<footer>Countdown Timer &mdash; Free online countdown timer</footer>
<script>
(function(){
  const hoursIn=document.getElementById('hours'),minutesIn=document.getElementById('minutes'),secondsIn=document.getElementById('seconds');
  const display=document.getElementById('countdownDisplay'),startBtn=document.getElementById('startBtn');
  const stopBtn=document.getElementById('stopBtn'),resetBtn=document.getElementById('resetBtn'),alarmText=document.getElementById('alarmText');
  let totalSecs=0,remaining=0,running=false,interval=null;

  function getTotal(){return parseInt(hoursIn.value||0,10)*3600+parseInt(minutesIn.value||0,10)*60+parseInt(secondsIn.value||0,10)}
  function fmt(secs){const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
  function updateDisplay(){display.textContent=fmt(remaining);if(remaining===0&&running){clearInterval(interval);running=false;startBtn.disabled=false;stopBtn.disabled=true;display.className='countdown-time finished';alarmText.textContent='⏰ Time\'s up!';return}}
  function start(){const t=getTotal();if(t<=0)return;if(running)return;if(remaining<=0)remaining=t;running=true;startBtn.disabled=true;stopBtn.disabled=false;display.className='countdown-time running';alarmText.textContent='';interval=setInterval(function(){remaining--;if(remaining<0)remaining=0;updateDisplay()},1000)}
  function stop(){if(!running)return;running=false;clearInterval(interval);startBtn.disabled=false;stopBtn.disabled=true;display.className='countdown-time'}
  function reset(){clearInterval(interval);running=false;startBtn.disabled=false;stopBtn.disabled=true;remaining=0;display.className='countdown-time';alarmText.textContent='';const t=getTotal();display.textContent=fmt(t)}
  startBtn.addEventListener('click',start);
  stopBtn.addEventListener('click',stop);
  resetBtn.addEventListener('click',reset);
  document.querySelectorAll('.preset-btn').forEach(function(btn){btn.addEventListener('click',function(){reset();hoursIn.value=this.dataset.h;minutesIn.value=this.dataset.m;secondsIn.value=this.dataset.s;display.textContent=fmt(getTotal())})});
  [hoursIn,minutesIn,secondsIn].forEach(function(inp){inp.addEventListener('input',reset)});
})();
</script>
</body>
</html>
