<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter — Transform Text Online</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #f4f5f7;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Layout ── */
  .page-wrap { display: flex; flex: 1; max-width: 1280px; margin: 0 auto; width: 100%; }
  .main-area { flex: 1; min-width: 0; padding: 32px 24px 48px; }
  .sidebar { width: 200px; flex-shrink: 0; padding: 32px 16px; }

  /* ── Header ── */
  header { text-align: center; margin-bottom: 16px; }
  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.3px; }
  header p { color: #555; font-size: 15px; margin-top: 4px; }

  /* ── Ad slots ── */
  .ad-slot {
    background: #e8e9ed;
    border: 1px dashed #bbb;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    font-size: 13px;
  }
  .ad-top   { width: 100%; height: 90px; margin-bottom: 24px; }
  .ad-side  { width: 100%; min-height: 300px; margin-bottom: 16px; }
  .ad-label { position: absolute; top: 6px; left: 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; }
  .ad-slot { position: relative; }

  /* ── Card ── */
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 6px rgba(0,0,0,.04);
    padding: 28px 32px 32px;
  }

  /* ── Input ── */
  .input-group { margin-bottom: 20px; }
  .input-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #333; }
  textarea {
    width: 100%;
    height: 200px;
    padding: 14px 16px;
    font-size: 15px;
    font-family: inherit;
    line-height: 1.6;
    border: 1.5px solid #d0d5dd;
    border-radius: 8px;
    resize: vertical;
    transition: border-color .2s, box-shadow .2s;
  }
  textarea:focus { outline: none; border-color: #5b5bd6; box-shadow: 0 0 0 3px rgba(91,91,214,.15); }
  textarea::placeholder { color: #aaa; }

  /* ── Convert button ── */
  .convert-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 28px;
    font-size: 15px; font-weight: 600;
    color: #fff; background: #5b5bd6;
    border: none; border-radius: 8px;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .btn-primary:hover { background: #4a4ac2; }
  .btn-primary:active { transform: scale(.97); }
  .char-count { font-size: 13px; color: #888; margin-left: auto; }

  /* ── Results ── */
  .results { display: flex; flex-direction: column; gap: 14px; }
  .result-item {
    display: flex; align-items: flex-start; gap: 10px;
  }
  .result-item .tag {
    flex-shrink: 0; width: 130px;
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    color: #5b5bd6; padding-top: 10px;
  }
  .result-item .output-wrap {
    flex: 1; min-width: 0;
    position: relative;
  }
  .result-item .output {
    width: 100%; min-height: 44px;
    padding: 10px 48px 10px 14px;
    font-size: 15px; font-family: inherit; line-height: 1.5;
    border: 1.5px solid #e2e4e8;
    border-radius: 8px;
    background: #fafbfc;
    color: #1a1a2e;
    resize: none; overflow: hidden;
    transition: border-color .2s;
  }
  .result-item .output:focus { border-color: #5b5bd6; outline: none; }

  .btn-copy {
    position: absolute; top: 7px; right: 7px;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 12px;
    font-size: 12px; font-weight: 600;
    color: #555; background: #f0f0f5;
    border: 1px solid #d0d5dd; border-radius: 6px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .btn-copy:hover { background: #e4e4ef; color: #1a1a2e; }
  .btn-copy.copied { background: #d4edda; border-color: #8cc99c; color: #155724; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center; padding: 40px 0 20px; color: #999;
  }
  .empty-state svg { display: block; margin: 0 auto 12px; opacity: .35; }
  .empty-state p { font-size: 14px; }

  /* ── Footer ── */
  footer { text-align: center; padding: 24px 16px 32px; font-size: 13px; color: #999; }

  /* ── Responsive ── */
  @media (max-width: 820px) {
    .sidebar { display: none; }
    .main-area { padding: 20px 16px 36px; }
    .card { padding: 20px; }
  }
  @media (max-width: 600px) {
    header h1 { font-size: 22px; }
    textarea { height: 150px; font-size: 14px; }
    .result-item { flex-direction: column; gap: 4px; }
    .result-item .tag { width: auto; padding-top: 4px; }
    .btn-primary { width: 100%; justify-content: center; }
    .char-count { margin-left: 0; width: 100%; text-align: right; }
    .convert-row { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<!-- ─── Ad: Top ─── -->
<div class="ad-slot ad-top"><span class="ad-label">Advertisement</span></div>

<div class="page-wrap">
  <main class="main-area">

    <header>
      <h1>Case Converter</h1>
      <p>Paste or type your text and choose a case style.</p>
    </header>

    <!-- ─── Ad: Top (in-content) ─── -->
    <div class="ad-slot ad-top" style="height:70px;margin-bottom:20px;"><span class="ad-label">Advertisement</span></div>

    <div class="card">
      <div class="input-group">
        <label for="inputText">Your text</label>
        <textarea id="inputText" placeholder="Paste or type your text here…" spellcheck="false"></textarea>
      </div>

      <div class="convert-row">
        <button class="btn-primary" id="convertBtn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4 L4 1 L7 4"/><path d="M4 1 L4 11 Q4 13 6 13 L15 13"/><path d="M15 12 L12 15 L9 12"/><path d="M12 15 L12 5 Q12 3 10 3 L1 3"/></svg>
          Convert
        </button>
        <span class="char-count" id="charCount">0 characters</span>
      </div>

      <div id="results">
        <div class="empty-state" id="emptyState">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <p>Enter text above and click <strong>Convert</strong> to see results.</p>
        </div>
        <div class="results" id="resultsList" style="display:none"></div>
      </div>
    </div>

  </main>

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar">
    <div class="ad-slot ad-side"><span class="ad-label">Advertisement</span></div>
    <div class="ad-slot ad-side" style="min-height:250px;"><span class="ad-label">Advertisement</span></div>
  </aside>
</div>

<footer>Case Converter &mdash; Free online text case transformer</footer>

<script>
(function() {
  const input = document.getElementById('inputText');
  const convertBtn = document.getElementById('convertBtn');
  const charCount = document.getElementById('charCount');
  const emptyState = document.getElementById('emptyState');
  const resultsList = document.getElementById('resultsList');

  // ── Character count ──
  input.addEventListener('input', function() {
    const len = this.value.length;
    charCount.textContent = len + ' character' + (len !== 1 ? 's' : '');
  });

  // ── Case transforms ──
  function toTitleCase(str) {
    return str.replace(/\S+/g, w => w[0].toUpperCase() + w.slice(1).toLowerCase());
  }

  function toSentenceCase(str) {
    return str.replace(/(?:^\s*|[.!?]\s+)\S/g, c => c.toUpperCase());
  }

  function toAlternatingCase(str) {
    let out = '';
    let i = 0;
    for (const ch of str) {
      if (/[a-zA-Z]/.test(ch)) {
        out += i++ % 2 === 0 ? ch.toUpperCase() : ch.toLowerCase();
      } else {
        out += ch;
      }
    }
    return out;
  }

  const transforms = [
    { label: 'UPPERCASE', fn: str => str.toUpperCase() },
    { label: 'lowercase', fn: str => str.toLowerCase() },
    { label: 'Title Case', fn: toTitleCase },
    { label: 'Sentence case', fn: toSentenceCase },
    { label: 'aLtErNaTiNg cAsE', fn: toAlternatingCase },
  ];

  // ── Render ──
  function render(text) {
    if (!text) {
      emptyState.style.display = 'block';
      resultsList.style.display = 'none';
      resultsList.innerHTML = '';
      return;
    }

    emptyState.style.display = 'none';
    resultsList.style.display = 'flex';

    let html = '';
    for (const t of transforms) {
      let result;
      try { result = t.fn(text); } catch(e) { result = text; }
      const escaped = result.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      html +=
        '<div class="result-item">' +
          '<div class="tag">' + t.label + '</div>' +
          '<div class="output-wrap">' +
            '<textarea class="output" rows="1" readonly>' + escaped + '</textarea>' +
            '<button class="btn-copy" data-text="' + escaped.replace(/'/g,'&#39;') + '">' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
              'Copy' +
            '</button>' +
          '</div>' +
        '</div>';
    }
    resultsList.innerHTML = html;

    // auto-resize textareas
    resultsList.querySelectorAll('.output').forEach(ta => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });

    // copy buttons
    resultsList.querySelectorAll('.btn-copy').forEach(btn => {
      btn.addEventListener('click', function() {
        const text = this.getAttribute('data-text');
        // handle any &#39; unescaping
        const raw = text.replace(/&#39;/g, "'");
        navigator.clipboard.writeText(raw).then(() => {
          const orig = this.innerHTML;
          this.innerHTML =
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' +
            'Copied!';
          this.classList.add('copied');
          setTimeout(() => {
            this.innerHTML = orig;
            this.classList.remove('copied');
          }, 1800);
        }).catch(() => {
          // fallback
          const ta = this.parentElement.querySelector('.output');
          ta.select();
          document.execCommand('copy');
          const orig = this.innerHTML;
          this.innerHTML =
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' +
            'Copied!';
          this.classList.add('copied');
          setTimeout(() => {
            this.innerHTML = orig;
            this.classList.remove('copied');
          }, 1800);
        });
      });
    });
  }

  // ── Events ──
  function convert() {
    render(input.value);
  }

  convertBtn.addEventListener('click', convert);

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      convert();
    }
  });

  // run on load if content exists (e.g. after page refresh)
  if (input.value) convert();
})();
</script>
</body>
</html>
