<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder — Free Online Base64 Encoder & Decoder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #f4f5f7;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .page-wrap { display: flex; flex: 1; max-width: 1280px; margin: 0 auto; width: 100%; }
  .main-area { flex: 1; min-width: 0; padding: 32px 24px 48px; }
  .sidebar { width: 200px; flex-shrink: 0; padding: 32px 16px; }
  header { text-align: center; margin-bottom: 16px; }
  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.3px; }
  header p { color: #555; font-size: 15px; margin-top: 4px; }
  .ad-slot { position: relative; background: #e8e9ed; border: 1px dashed #bbb; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #888; font-size: 13px; }
  .ad-top { width: 100%; height: 90px; margin-bottom: 24px; }
  .ad-side { width: 100%; min-height: 300px; margin-bottom: 16px; }
  .ad-label { position: absolute; top: 6px; left: 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 6px rgba(0,0,0,.04); padding: 28px 32px 32px; }
  .unit-toggle { display: flex; gap: 0; margin-bottom: 18px; background: #f0f0f5; border-radius: 8px; padding: 3px; width: fit-content; }
  .unit-toggle input { display: none; }
  .unit-toggle label { padding: 8px 24px; font-size: 14px; font-weight: 600; color: #666; border-radius: 6px; cursor: pointer; transition: background .2s, color .2s, box-shadow .15s; user-select: none; }
  .unit-toggle input:checked + label { background: #fff; color: #5b5bd6; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .unit-toggle label:hover { color: #333; }
  .input-group { margin-bottom: 14px; }
  .input-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #555; text-transform: uppercase; letter-spacing: .3px; }
  textarea { width: 100%; padding: 12px 14px; font-size: 13px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; line-height: 1.5; border: 1.5px solid #d0d5dd; border-radius: 8px; resize: vertical; transition: border-color .2s, box-shadow .2s; }
  textarea:focus { outline: none; border-color: #5b5bd6; box-shadow: 0 0 0 3px rgba(91,91,214,.15); }
  textarea::placeholder { color: #bbb; }
  #inputText { height: 150px; }
  #outputText { height: 150px; background: #f8f9fc; }
  .btn-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 14px 0; }
  .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 10px 26px; font-size: 14px; font-weight: 600; color: #fff; background: #5b5bd6; border: none; border-radius: 8px; cursor: pointer; transition: background .2s, transform .1s; }
  .btn-primary:hover { background: #4a4ac2; }
  .btn-primary:active { transform: scale(.97); }
  .btn-secondary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; font-size: 13px; font-weight: 600; color: #555; background: #f0f0f5; border: 1.5px solid #d0d5dd; border-radius: 8px; cursor: pointer; transition: background .15s, color .15s; }
  .btn-secondary:hover { background: #e4e4ef; color: #1a1a2e; }
  .btn-secondary.copied { background: #d4edda; border-color: #8cc99c; color: #155724; }
  .status-bar { font-size: 13px; color: #888; margin-top: 6px; min-height: 20px; }
  .status-bar .error { color: #ef4444; font-weight: 600; }
  footer { text-align: center; padding: 24px 16px 32px; font-size: 13px; color: #999; }
  @media (max-width: 820px) { .sidebar { display: none; } .main-area { padding: 20px 16px 36px; } .card { padding: 20px; } }
  @media (max-width: 600px) { header h1 { font-size: 22px; } .btn-primary, .btn-secondary { width: 100%; justify-content: center; } .btn-row { flex-direction: column; align-items: stretch; } }
</style>
</head>
<body>
<div class="ad-slot ad-top"><span class="ad-label">Advertisement</span></div>
<div class="page-wrap">
  <main class="main-area">
    <header><h1>Base64 Encoder / Decoder</h1><p>Encode text to Base64 or decode Base64 back to text.</p></header>
    <div class="ad-slot ad-top" style="height:70px;margin-bottom:20px;"><span class="ad-label">Advertisement</span></div>
    <div class="card">
      <div class="unit-toggle">
        <input type="radio" name="mode" id="modeEncode" value="encode" checked><label for="modeEncode">Encode</label>
        <input type="radio" name="mode" id="modeDecode" value="decode"><label for="modeDecode">Decode</label>
      </div>
      <div class="input-group"><label for="inputText">Input</label><textarea id="inputText" placeholder="Type or paste text here…" spellcheck="false"></textarea></div>
      <div class="btn-row">
        <button class="btn-primary" id="convertBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg> Convert</button>
        <button class="btn-secondary" id="swapBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg> Swap Input/Output</button>
      </div>
      <div class="input-group"><label for="outputText">Output</label><textarea id="outputText" placeholder="Result will appear here…" spellcheck="false" readonly></textarea></div>
      <div class="status-bar" id="statusBar"><span>Select mode, enter text, and click <strong>Convert</strong>.</span></div>
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn-secondary" id="copyBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Result</button>
      </div>
    </div>
  </main>
  <aside class="sidebar">
    <div class="ad-slot ad-side"><span class="ad-label">Advertisement</span></div>
    <div class="ad-slot ad-side" style="min-height:250px;"><span class="ad-label">Advertisement</span></div>
  </aside>
</div>
<footer>Base64 Encoder &mdash; Free online Base64 encoding and decoding tool</footer>
<script>
(function() {
  const inputText = document.getElementById('inputText');
  const outputText = document.getElementById('outputText');
  const convertBtn = document.getElementById('convertBtn');
  const swapBtn = document.getElementById('swapBtn');
  const copyBtn = document.getElementById('copyBtn');
  const modeEncode = document.getElementById('modeEncode');
  const modeDecode = document.getElementById('modeDecode');
  const statusBar = document.getElementById('statusBar');

  function convert() {
    const text = inputText.value;
    if (!text) {
      outputText.value = '';
      statusBar.innerHTML = '<span>Enter text to convert.</span>';
      return;
    }
    try {
      if (modeEncode.checked) {
        const encoded = btoa(unescape(encodeURIComponent(text)));
        outputText.value = encoded;
        statusBar.innerHTML = '<span>Encoded: ' + text.length + ' chars → ' + encoded.length + ' chars</span>';
      } else {
        const decoded = decodeURIComponent(escape(atob(text)));
        outputText.value = decoded;
        statusBar.innerHTML = '<span>Decoded: ' + text.length + ' chars → ' + decoded.length + ' chars</span>';
      }
    } catch (e) {
      outputText.value = '';
      statusBar.innerHTML = '<span class="error">Error: ' + e.message + '</span>';
    }
  }

  convertBtn.addEventListener('click', convert);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); convert(); }
  });

  swapBtn.addEventListener('click', function() {
    const tmp = inputText.value;
    inputText.value = outputText.value;
    outputText.value = '';
    // auto-convert if there's content
    if (inputText.value) convert();
  });

  copyBtn.addEventListener('click', function() {
    const text = outputText.value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
      const orig = copyBtn.innerHTML;
      copyBtn.innerHTML = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(function() { copyBtn.innerHTML = orig; copyBtn.classList.remove('copied'); }, 1800);
    });
  });
})();
</script>
</body>
</html>
