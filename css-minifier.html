(function(){
  const inputCss=document.getElementById('inputCss'),outputCss=document.getElementById('outputCss');
  const originalSize=document.getElementById('originalSize'),minifiedSize=document.getElementById('minifiedSize');
  const savedPercent=document.getElementById('savedPercent'),minifyBtn=document.getElementById('minifyBtn');
  const copyCss=document.getElementById('copyCss'),clearCss=document.getElementById('clearCss');

  function minify(css){
    return css
      .replace(/\/\*[\s\S]*?\*\//g,'')
      .replace(/\s*([{}:;,])\s*/g,'$1')
      .replace(/\s+/g,' ')
      .replace(/;}/g,'}')
      .replace(/}\s+/g,'}')
      .replace(/,\s+/g,',')
      .replace(/: +/g,':')
      .replace(/ +{/g,'{')
      .replace(/\s+$/,'')
      .trim()
  }

  function updateStats(orig,mini){
    const oB=new Blob([orig]).size,mB=new Blob([mini]).size;
    originalSize.textContent=oB;
    minifiedSize.textContent=mB;
    const pct=oB>0?Math.round((1-mB/oB)*100):0;
    savedPercent.textContent=pct+'%'
  }

  function doMinify(){
    const orig=inputCss.value;
    if(!orig.trim()){outputCss.value='';updateStats(0,0);return}
    const mini=minify(orig);
    outputCss.value=mini;
    updateStats(orig,mini)
  }

  minifyBtn.addEventListener('click',doMinify);
  copyCss.addEventListener('click',function(){navigator.clipboard.writeText(outputCss.value).catch(function(){})});
  clearCss.addEventListener('click',function(){inputCss.value='';outputCss.value='';updateStats(0,0)});
