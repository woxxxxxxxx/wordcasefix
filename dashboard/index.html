<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM 自动化仪表板</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#161616;--bg4:#1c1c1c;
  --border:#222;--border2:#2a2a2a;
  --green:#00c896;--green-dim:#00c89618;--green-dark:#007a5e;
  --red:#ff4d4d;--red-dim:#ff4d4d18;
  --yellow:#f5a623;--yellow-dim:#f5a62318;
  --blue:#4d9eff;--blue-dim:#4d9eff18;
  --purple:#a78bfa;--purple-dim:#a78bfa18;
  --gray:#555;--gray2:#333;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --mono:'JetBrains Mono','Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  --r:10px;--rs:6px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
a{color:inherit;text-decoration:none}
a:hover{color:var(--green)}

/* ── Layout ── */
.page{max-width:1440px;margin:0 auto;padding:20px 18px}
.section{margin-bottom:28px}
.sec-title{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.sec-badge{margin-left:auto;font-size:10px;color:var(--text3);font-weight:400;letter-spacing:0}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:linear-gradient(135deg,#111 0%,#0f1a0f 100%);border:1px solid var(--border);border-radius:var(--r);margin-bottom:24px}
.hdr-logo{font-size:20px;font-weight:800;letter-spacing:-.5px}
.hdr-logo em{color:var(--green);font-style:normal}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.hdr-right{display:flex;align-items:center;gap:18px}
.hdr-meta{text-align:right}
.hdr-meta-label{font-size:10px;color:var(--text3)}
.hdr-meta-val{font-size:12px;color:var(--text2);font-family:var(--mono)}
.btn-refresh{background:var(--green-dim);border:1px solid var(--green-dark);color:var(--green);padding:7px 16px;border-radius:var(--rs);font-size:12px;cursor:pointer;transition:.15s;font-family:var(--sans)}
.btn-refresh:hover{background:var(--green);color:#000;font-weight:600}
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;vertical-align:middle;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Todos ── */
.todos{display:flex;flex-direction:column;gap:6px}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--rs);border-left:3px solid transparent}
.todo-high{background:#1a0a0a;border-color:var(--red)}
.todo-medium{background:#1a1200;border-color:var(--yellow)}
.todo-info{background:#0a1220;border-color:var(--blue)}
.todo-low{background:var(--bg3);border-color:var(--border2)}
.todo-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.todo-text{font-size:12px;color:var(--text2);line-height:1.5}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.card:hover{border-color:var(--border2)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.2px;white-space:nowrap;line-height:1.6}
.bg{background:var(--green-dim);color:var(--green);border:1px solid var(--green-dark)}
.br{background:var(--red-dim);color:var(--red);border:1px solid #7f1d1d}
.by{background:var(--yellow-dim);color:var(--yellow);border:1px solid #78350f}
.bb{background:var(--blue-dim);color:var(--blue);border:1px solid #1e3a5f}
.bgr{background:#1a1a1a;color:var(--gray);border:1px solid var(--border2)}
.bpurple{background:var(--purple-dim);color:var(--purple);border:1px solid #4c1d95}

/* ── Site Cards ── */
.sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.site-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--r);padding:18px;transition:.2s;position:relative}
.site-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.sc-name{font-size:16px;font-weight:700;letter-spacing:-.3px}
.sc-domain{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.sc-hosting{font-size:10px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:3px;border:1px solid var(--border);margin-top:4px;display:inline-block}
.sc-badges{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0}
.sc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.sc-metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px}
.sc-metric-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc-metric-val{font-size:12px;font-weight:600}
.sc-last{padding:8px 11px;background:var(--bg3);border-radius:var(--rs);border:1px solid var(--border)}
.sc-last-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.sc-last-val{font-size:11px;color:var(--text2);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-last-time{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.online-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── Timeline ── */
.tl{display:flex;flex-direction:column}
.tl-row{display:grid;grid-template-columns:90px 14px 1fr;gap:0 14px;align-items:start;padding:13px 0;border-bottom:1px solid var(--border)}
.tl-row:last-child{border-bottom:none}
.tl-time{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);text-align:right;padding-top:3px}
.tl-spine{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border2);background:var(--bg3);flex-shrink:0;margin-top:3px}
.tl-dot-ok{border-color:var(--green);background:var(--green-dim)}
.tl-dot-fail{border-color:var(--red);background:var(--red-dim)}
.tl-conn{width:2px;background:var(--border);flex:1;min-height:18px;margin-top:3px}
.tl-body{}
.tl-label{font-size:14px;font-weight:600;margin-bottom:5px}
.tl-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-ts{font-size:11px;color:var(--text3);font-family:var(--mono)}
.tl-file{font-size:10px;color:var(--text3);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;max-width:240px}

/* ── Progress bar ── */
.pbar{height:8px;background:var(--bg3);border-radius:4px;border:1px solid var(--border);overflow:hidden;margin:6px 0}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:4px;transition:width .6s}

/* ── Days grid ── */
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}
.day-cell{border-radius:var(--rs);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px;font-size:9px;color:var(--text3);border:1px solid var(--border);cursor:default}
.day-cell-on{background:var(--green-dim);border-color:var(--green-dark);color:var(--green)}
.day-cell-today{box-shadow:0 0 0 1px var(--blue)}
.day-date{font-family:var(--mono);font-size:9px;margin-top:2px}

/* ── Article list ── */
.art-list{display:flex;flex-direction:column;gap:5px}
.art-item{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs)}
.art-num{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--mono);margin-top:1px}
.art-title{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.art-slug{font-size:10px;color:var(--text3);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Health table ── */
.htable{width:100%;border-collapse:collapse}
.htable th{text-align:left;padding:9px 12px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap}
.htable td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.htable tbody tr:last-child td{border-bottom:none}
.htable tbody tr:hover td{background:var(--bg3)}
.site-dot-row{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

/* ── Spinner ── */
.spin-wrap{display:flex;align-items:center;justify-content:center;height:120px;color:var(--text3);gap:10px;font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ── */
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}.sites-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.sites-grid{grid-template-columns:1fr}.hdr{flex-direction:column;gap:12px}}
</style>
</head>
<body>
<div class="page">

<!-- ─── 顶栏 ─────────────────────────────────────────────────────────────── -->
<div class="hdr">
  <div>
    <div class="hdr-logo">PM<em>Auto</em> 仪表板</div>
    <div class="hdr-sub">9个站点 · 5个定时任务 · 实时自动化监控</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-meta">
      <div class="hdr-meta-label"><span class="pulse"></span>最后更新</div>
      <div class="hdr-meta-val" id="last-update">加载中…</div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px">每60秒自动刷新</div>
    </div>
    <button class="btn-refresh" onclick="loadData()">↻ 刷新</button>
  </div>
</div>

<!-- ─── 待办事项 ──────────────────────────────────────────────────────────── -->
<div class="section">
  <div class="sec-title">
    <div class="sdot" style="background:var(--yellow)"></div>
    待办事项
    <span class="sec-badge" id="todo-count"></span>
  </div>
  <div id="todos"><div class="spin-wrap"><div class="spinner"></div>加载中…</div></div>
</div>

<!-- ─── 站点总览 ──────────────────────────────────────────────────────────── -->
<div class="section">
  <div class="sec-title">
    <div class="sdot" style="background:var(--green)"></div>
    站点总览
    <span class="sec-badge" id="sites-summary"></span>
  </div>
  <div class="sites-grid" id="sites-grid">
    <div class="spin-wrap"><div class="spinner"></div>加载中…</div>
  </div>
</div>

<!-- ─── 时间轴 ───────────────────────────────────────────────────────────── -->
<div class="section">
  <div class="sec-title">
    <div class="sdot" style="background:var(--blue)"></div>
    今日自动化执行时间轴
  </div>
  <div class="card">
    <div class="tl" id="timeline">
      <div class="spin-wrap"><div class="spinner"></div>加载中…</div>
    </div>
  </div>
</div>

<!-- ─── 内容流水线 + 最近文章 ───────────────────────────────────────────── -->
<div class="grid2">
  <div class="section" style="margin-bottom:0">
    <div class="sec-title">
      <div class="sdot" style="background:var(--yellow)"></div>
      内容流水线
    </div>
    <div class="card" id="content-pipeline">
      <div class="spin-wrap"><div class="spinner"></div>加载中…</div>
    </div>
  </div>
  <div class="section" style="margin-bottom:0">
    <div class="sec-title">
      <div class="sdot" style="background:var(--purple)"></div>
      最近自动发布文章
    </div>
    <div class="card" id="recent-articles">
      <div class="spin-wrap"><div class="spinner"></div>加载中…</div>
    </div>
  </div>
</div>

<!-- ─── 系统健康状态 ───────────────────────────────────────────────────── -->
<div class="section" style="margin-top:24px">
  <div class="sec-title">
    <div class="sdot" style="background:var(--red)"></div>
    系统健康状态
    <span class="sec-badge" id="monitor-time"></span>
  </div>
  <div class="card" id="health-section">
    <div class="spin-wrap"><div class="spinner"></div>加载中…</div>
  </div>
</div>

</div><!-- /page -->

<script>
// ─── 工具函数 ─────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtTime(iso){
  if(!iso) return '—';
  const d=new Date(iso);
  const mo=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  const ss=String(d.getSeconds()).padStart(2,'0');
  return `${mo}-${dd} ${hh}:${mm}:${ss}`;
}

function adsenseBadge(adsense){
  const {status, days, submitted} = adsense;
  if(status==='approved') return '<span class="badge bg">✓ 已通过</span>';
  if(status==='skip')     return '<span class="badge bgr">跳过</span>';
  if(!submitted)          return '<span class="badge bgr">未提交</span>';
  const cls = days<=7 ? 'by' : days<=14 ? 'by' : 'br';
  return `<span class="badge ${cls}">审核中 ${days}天</span>`;
}

function boolBadge(val, trueText, falseText, nullText='—', falseClass='br', nullClass='bgr'){
  if(val===null||val===undefined) return `<span class="badge ${nullClass}">${nullText}</span>`;
  return val
    ? `<span class="badge bg">${trueText}</span>`
    : `<span class="badge ${falseClass}">${falseText}</span>`;
}

function onlineBadge(h){
  if(h.online===true)  return '<span class="badge bg">● 在线</span>';
  if(h.online===false) return '<span class="badge br">● 离线</span>';
  if(h.onlineLabel)    return `<span class="badge bb">${esc(h.onlineLabel)}</span>`;
  return '<span class="badge bgr">— 未知</span>';
}

function adsTxtBadge(h){
  if(h.ads_txt===true)  return '<span class="badge bg">✓ 正常</span>';
  if(h.ads_txt===false) return '<span class="badge br">✗ 异常</span>';
  if(h.adsTxtLabel)     return `<span class="badge bb">${esc(h.adsTxtLabel)}</span>`;
  return '<span class="badge bgr">—</span>';
}

// ─── 待办事项 ─────────────────────────────────────────────────────────────────
function renderTodos(todos){
  document.getElementById('todo-count').textContent = todos.length + ' 项';
  if(!todos.length){
    document.getElementById('todos').innerHTML =
      '<div style="padding:12px 16px;color:var(--green);font-size:13px;background:var(--green-dim);border:1px solid var(--green-dark);border-radius:var(--rs)">✅ 暂无待办事项</div>';
    return;
  }
  document.getElementById('todos').innerHTML = '<div class="todos">' +
    todos.map(t=>`<div class="todo-item todo-${t.level}">
      <span class="todo-icon">${t.icon}</span>
      <span class="todo-text">${esc(t.text)}</span>
    </div>`).join('') + '</div>';
}

// ─── 站点总览 ─────────────────────────────────────────────────────────────────
function renderSites(sites){
  const online = sites.filter(s=>s.health.online===true).length;
  const unknown = sites.filter(s=>s.health.online===null).length;
  document.getElementById('sites-summary').textContent =
    `${online} 在线 · ${unknown} 需验证 · ${sites.length} 总计`;

  document.getElementById('sites-grid').innerHTML = sites.map(s=>{
    const dotColor = s.health.online===true ? 'var(--green)' : s.health.online===false ? 'var(--red)' : 'var(--yellow)';

    const lastBlock = s.lastPublish ? `
<div class="sc-last">
  <div class="sc-last-lbl">最近发布</div>
  <div class="sc-last-val">${esc(s.lastPublish)}</div>
  ${s.lastPublishTime ? `<div class="sc-last-time">${fmtTime(s.lastPublishTime)}</div>` : ''}
</div>` : '';

    return `
<div class="site-card" style="border-left-color:${esc(s.color)}">
  <div class="sc-top">
    <div>
      <div class="sc-name">${esc(s.name)}</div>
      <div class="sc-domain"><a href="https://${esc(s.domain)}" target="_blank">${esc(s.domain)}</a></div>
      <span class="sc-hosting">${esc(s.hosting)}</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
      <div class="online-dot" style="background:${dotColor}" title="${s.health.detail||''}"></div>
    </div>
  </div>
  <div class="sc-badges">
    ${onlineBadge(s.health)}
    ${adsTxtBadge(s.health)}
    ${boolBadge(s.health.sitemap,'站点地图 ✓','站点地图 ✗','站点地图 —','br','bgr')}
  </div>
  <div class="sc-metrics">
    <div class="sc-metric">
      <div class="sc-metric-lbl">AdSense</div>
      <div class="sc-metric-val">${adsenseBadge(s.adsense)}</div>
    </div>
    <div class="sc-metric">
      <div class="sc-metric-lbl">GA4</div>
      <div class="sc-metric-val">${boolBadge(s.ga.connected,'已连接','未连接','—')}</div>
    </div>
  </div>
  ${lastBlock}
</div>`;
  }).join('');
}

// ─── 时间轴 ───────────────────────────────────────────────────────────────────
function renderTimeline(tl){
  document.getElementById('timeline').innerHTML = tl.map((t,i)=>{
    const isLast=i===tl.length-1;
    const dotCls = t.success===true ? 'tl-dot-ok' : t.success===false ? 'tl-dot-fail' : '';
    const stBadge = t.success===true
      ? '<span class="badge bg">✓ 成功</span>'
      : t.success===false
        ? '<span class="badge br">✗ 失败</span>'
        : '<span class="badge bgr">暂无数据</span>';
    return `
<div class="tl-row">
  <div class="tl-time">${esc(t.time)}</div>
  <div class="tl-spine">
    <div class="tl-dot ${dotCls}"></div>
    ${!isLast ? '<div class="tl-conn"></div>' : ''}
  </div>
  <div class="tl-body">
    <div class="tl-label">${esc(t.label)}</div>
    <div class="tl-meta">
      ${stBadge}
      <span class="tl-ts">上次执行：${fmtTime(t.lastRun)}</span>
      ${t.file ? `<span class="tl-file">${esc(t.file)}</span>` : ''}
    </div>
  </div>
</div>`;
  }).join('');
}

// ─── 内容流水线 ───────────────────────────────────────────────────────────────
function renderContentPipeline(cp){
  const pct = cp.total ? Math.round(cp.used/cp.total*100) : 0;
  const daysHtml = cp.recentDays.map((d,i)=>{
    const cls = ['day-cell', d.hasOutput?'day-cell-on':'', i===0?'day-cell-today':''].filter(Boolean).join(' ');
    const tip = d.hasOutput ? (d.topic||d.date) : d.date;
    return `<div class="${cls}" title="${esc(tip)}">
      <span>${d.hasOutput ? '✓' : '·'}</span>
      <span class="day-date">${d.date.slice(5)}</span>
    </div>`;
  }).join('');

  document.getElementById('content-pipeline').innerHTML = `
<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px">
  <span style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--green)">${cp.used}<span style="font-size:14px;color:var(--text3)"> / ${cp.total}</span></span>
  <span class="badge bb">剩余 ${cp.remaining} 个选题</span>
</div>
<div style="font-size:11px;color:var(--text3);margin-bottom:4px">已使用选题</div>
<div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:16px">
  <span>0</span><span>${pct}% 已用</span><span>${cp.total}</span>
</div>
<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">最近7天内容输出</div>
<div class="days-grid">${daysHtml}</div>`;
}

// ─── 最近文章 ─────────────────────────────────────────────────────────────────
function renderRecentArticles(ra){
  function listHtml(items, color){
    return items.map((a,i)=>`
<div class="art-item">
  <div class="art-num" style="background:${color}22;border:1px solid ${color}55;color:${color}">${i+1}</div>
  <div style="min-width:0">
    <div class="art-title"><a href="${esc(a.url)}" target="_blank">${esc(a.title)}</a></div>
    <div class="art-slug">${esc(a.slug)}</div>
  </div>
</div>`).join('');
  }
  document.getElementById('recent-articles').innerHTML = `
<div style="margin-bottom:16px">
  <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
    <div style="width:8px;height:8px;border-radius:50%;background:#1e40af"></div>
    <span style="font-size:11px;font-weight:700;color:var(--text2)">InsuranceTipsPro</span>
    <span style="font-size:10px;color:var(--text3)">${ra.insurancetipspro.length} 篇</span>
  </div>
  <div class="art-list">${listHtml(ra.insurancetipspro,'#60a5fa')}</div>
</div>
<div>
  <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
    <div style="width:8px;height:8px;border-radius:50%;background:#065f46"></div>
    <span style="font-size:11px;font-weight:700;color:var(--text2)">FreelancerGuideHub</span>
    <span style="font-size:10px;color:var(--text3)">${ra.freelancerguidehub.length} 篇</span>
  </div>
  <div class="art-list">${listHtml(ra.freelancerguidehub,'#34d399')}</div>
</div>`;
}

// ─── 系统健康 ─────────────────────────────────────────────────────────────────
function renderHealth(data){
  if(data.health.monitorTime){
    document.getElementById('monitor-time').textContent =
      '监控时间：' + fmtTime(data.health.monitorTime);
  }
  const rows = data.sites.map(s=>{
    const sm = s.health.sitemap;
    const smBadge = sm===true
      ? `<span class="badge bg">✓</span> <span style="font-size:10px;color:var(--text3)">${esc(s.health.sitemapDetail||'')}</span>`
      : sm===false ? '<span class="badge br">✗ 不可访问</span>'
      : '<span class="badge bgr">—</span>';

    return `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="site-dot-row" style="background:${esc(s.color)}"></div>
          <div>
            <div style="font-weight:600">${esc(s.name)}</div>
            <div style="font-size:10px;color:var(--text3)">${esc(s.hosting)}</div>
          </div>
        </div>
      </td>
      <td>${onlineBadge(s.health)}</td>
      <td>${adsTxtBadge(s.health)}</td>
      <td>${smBadge}</td>
      <td>${boolBadge(s.ga.connected,'已连接','—','—')}</td>
      <td>${adsenseBadge(s.adsense)}</td>
    </tr>`;
  }).join('');

  document.getElementById('health-section').innerHTML = `
<div style="overflow-x:auto">
<table class="htable">
  <thead><tr>
    <th>站点</th>
    <th>在线状态</th>
    <th>ads.txt</th>
    <th>站点地图</th>
    <th>GA4</th>
    <th>AdSense</th>
  </tr></thead>
  <tbody>${rows}</tbody>
</table>
</div>
${data.health.recoveryOutput ? `
<div style="margin-top:14px;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs)">
  <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">恢复报告</div>
  <pre style="font-size:11px;color:var(--text2);font-family:var(--mono);white-space:pre-wrap;line-height:1.6">${esc(data.health.recoveryOutput)}</pre>
</div>` : ''}`;
}

// ─── 主加载函数 ───────────────────────────────────────────────────────────────
async function loadData(){
  try {
    const res = await fetch('/api/status');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    document.getElementById('last-update').textContent = fmtTime(data.timestamp);
    renderTodos(data.todos||[]);
    renderSites(data.sites);
    renderTimeline(data.timeline);
    renderContentPipeline(data.contentPipeline);
    renderRecentArticles(data.recentArticles);
    renderHealth(data);
  } catch(e) {
    document.getElementById('last-update').textContent = '错误: '+e.message;
    console.error(e);
  }
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
