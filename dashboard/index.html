<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Ops Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa; --s1:#ffffff; --s2:#f0f4f8; --s3:#e8edf2;
  --border:#e2e8f0; --border2:#cbd5e1;
  --text:#0f172a; --text2:#475569; --text3:#94a3b8;
  --gold:#b45309;
  --blue:#2563eb; --blue-dim:#dbeafe; --blue-dk:#93c5fd;
  --green:#16a34a; --green-dim:#dcfce7; --green-dk:#86efac;
  --red:#dc2626; --red-dim:#fee2e2; --red-dk:#fca5a5;
  --yellow:#d97706; --yellow-dim:#fef3c7; --yellow-dk:#fcd34d;
  --purple:#7c3aed; --orange:#ea580c;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',system-ui,sans-serif;
  --sb:56px; --topbar:52px; --r:8px; --rs:5px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.6;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
a{color:inherit;text-decoration:none}

/* ── SIDEBAR ──────────────────────────────────────────────────────────── */
.sb{position:fixed;top:0;left:0;width:var(--sb);height:100vh;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;z-index:200;padding:12px 0}
.sb-logo{width:32px;height:32px;background:linear-gradient(135deg,#1e40af,#2563eb);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;flex-shrink:0}
.sb-logo svg{width:18px;height:18px}
.sb-nav{list-style:none;display:flex;flex-direction:column;gap:4px;width:100%}
.sb-item{position:relative;width:100%;display:flex;justify-content:center}
.sb-item a{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);color:var(--text3);transition:.15s;cursor:pointer;text-decoration:none}
.sb-item a:hover{background:var(--s2);color:var(--text2)}
.sb-item.active a{color:var(--text);background:var(--s2)}
.sb-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:22px;background:var(--blue);border-radius:0 2px 2px 0}
.sb-item a svg{width:18px;height:18px}
.sb-tip{position:absolute;left:calc(var(--sb) + 4px);background:#1e293b;border:1px solid #334155;border-radius:var(--rs);padding:4px 10px;font-size:11px;color:#cbd5e1;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300}
.sb-item:hover .sb-tip{opacity:1}

/* ── MAIN LAYOUT ──────────────────────────────────────────────────────── */
.main{margin-left:var(--sb);min-height:100vh;display:flex;flex-direction:column}

/* ── TOPBAR ───────────────────────────────────────────────────────────── */
.topbar{position:sticky;top:0;z-index:100;height:var(--topbar);background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0;padding:0 20px}
.tb-stat{display:flex;align-items:center;gap:6px;padding:0 16px;border-right:1px solid var(--border);height:100%}
.tb-stat:first-child{padding-left:0}
.tb-stat:last-child{border-right:none;margin-left:auto}
.tb-stat-lbl{font-size:10px;color:var(--text3);font-family:var(--sans);text-transform:uppercase;letter-spacing:.5px}
.tb-stat-val{font-size:15px;font-weight:700;font-family:var(--mono);color:var(--text)}
.tb-stat-val.gold{color:var(--gold)}
.tb-stat-val.red{color:var(--red)}
.tb-alert-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;min-width:18px;text-align:center;font-family:var(--mono)}
.tb-clock{font-family:var(--mono);font-size:13px;color:var(--text2);min-width:140px;text-align:right}
.tb-refresh{background:var(--s2);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text2);padding:5px 12px;font-size:11px;font-family:var(--sans);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px;margin-left:12px}
.tb-refresh:hover{border-color:var(--blue);color:var(--blue)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CONTENT AREA ─────────────────────────────────────────────────────── */
.content{padding:20px;display:flex;flex-direction:column;gap:20px}

/* ── SECTION ─────────────────────────────────────────────────────────── */
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3)}
.sec-title span{color:var(--text2)}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-badge{font-size:10px;font-family:var(--mono);color:var(--text3);background:var(--s2);border:1px solid var(--border);border-radius:3px;padding:1px 7px}

/* ── CARD ─────────────────────────────────────────────────────────────── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-pad{padding:16px}

/* ── BADGE ───────────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;white-space:nowrap;font-family:var(--mono)}
.bg{background:var(--green-dim);color:var(--green);border:1px solid var(--green-dk)}
.br{background:var(--red-dim);color:var(--red);border:1px solid var(--red-dk)}
.by{background:var(--yellow-dim);color:var(--yellow);border:1px solid var(--yellow-dk)}
.bb{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-dk)}
.bgr{background:var(--s2);color:var(--text3);border:1px solid var(--border)}

/* ── ALERTS ──────────────────────────────────────────────────────────── */
#alerts{display:none}
#alerts.visible{display:block}
.alert-panel{background:#fff5f5;border:1px solid #fecaca;border-radius:var(--r);padding:14px 16px}
.alert-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.alert-hd-title{font-size:12px;font-weight:700;color:var(--red);display:flex;align-items:center;gap:6px}
.alert-dismiss-all{background:none;border:1px solid var(--red-dk);border-radius:3px;color:var(--red);font-size:10px;padding:3px 10px;cursor:pointer;font-family:var(--sans)}
.alert-dismiss-all:hover{background:var(--red-dim)}
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:var(--rs);margin-bottom:6px;background:#fef2f2;border:1px solid #fecaca;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.alert-item:last-child{margin-bottom:0}
.alert-sev{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;font-family:var(--mono)}
.alert-sev.high{background:#fee2e2;color:#dc2626}
.alert-sev.medium{background:#fef3c7;color:#d97706}
.alert-body{flex:1;font-size:12px;color:var(--text2)}
.alert-dm{background:none;border:1px solid var(--border2);border-radius:3px;color:var(--text3);font-size:10px;padding:2px 8px;cursor:pointer;flex-shrink:0;font-family:var(--sans)}
.alert-dm:hover{background:var(--s2);color:var(--text)}

/* ── SITES TABLE ─────────────────────────────────────────────────────── */
.sites-wrap{overflow-x:auto}
.sites-table{width:100%;border-collapse:collapse;font-size:12px}
.sites-table th{text-align:left;padding:8px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;font-family:var(--sans)}
.sites-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.sites-table tbody tr:last-child td{border-bottom:none}
.sites-table tbody tr{transition:.1s}
.sites-table tbody tr:hover td{background:var(--s2)}
.site-name-cell{display:flex;align-items:center;gap:8px}
.site-color-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.site-name{font-weight:600;font-size:12px}
.site-domain{font-size:10px;color:var(--text3);font-family:var(--mono)}
.deploy-files{font-family:var(--mono);font-size:11px}
.deploy-ok{color:var(--green)}
.deploy-warn{color:var(--red)}
.deploy-na{color:var(--text3)}
.last-deploy{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* ── TIMELINE ────────────────────────────────────────────────────────── */
.tl{display:flex;flex-direction:column}
.tl-row{display:grid;grid-template-columns:64px 20px 1fr;gap:0 12px;align-items:start;padding:10px 0;border-bottom:1px solid var(--border)}
.tl-row:last-child{border-bottom:none}
.tl-time{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text2);text-align:right;padding-top:2px}
.tl-spine{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);background:var(--s2);flex-shrink:0;margin-top:2px}
.tl-dot.ok{border-color:var(--green);background:#dcfce7}
.tl-dot.fail{border-color:var(--red);background:#fee2e2}
.tl-dot.new{border-color:var(--purple);background:#ede9fe}
.tl-conn{width:1px;background:var(--border);flex:1;min-height:14px;margin-top:3px}
.tl-body{padding-top:1px}
.tl-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.tl-new{font-size:9px;font-weight:700;background:#ede9fe;color:#5b21b6;border:1px solid #a78bfa;border-radius:3px;padding:1px 5px;font-family:var(--mono)}
.tl-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-ts{font-size:10px;color:var(--text3);font-family:var(--mono)}
.tl-file{font-size:10px;color:var(--text3);font-family:var(--mono);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── CONTENT PIPELINE ────────────────────────────────────────────────── */
.pipeline-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pipeline-site{padding:12px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);position:relative;overflow:hidden}
.pipeline-site-name{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.pipeline-nums{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:2px}
.pipeline-nums span{font-size:12px;color:var(--text3);font-weight:400}
.pipeline-sub{font-size:10px;color:var(--text3);margin-bottom:8px}
.pbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:6px}
.pbar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.pbar-green{background:linear-gradient(90deg,var(--green),#16a34a)}
.pbar-yellow{background:var(--yellow)}
.pbar-red{background:var(--red)}
.warn-badge{font-size:9px;font-weight:700;background:var(--red-dim);color:var(--red);border:1px solid var(--red-dk);border-radius:3px;padding:1px 6px;font-family:var(--mono)}

/* ── DAY CALENDAR ────────────────────────────────────────────────────── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.cal-cell{display:flex;flex-direction:column;align-items:center;padding:5px 2px;border-radius:4px;border:1px solid var(--border);font-size:9px;color:var(--text3)}
.cal-cell.on{background:#dcfce7;border-color:var(--green);color:var(--green)}
.cal-cell.today{box-shadow:0 0 0 1px var(--blue)}
.cal-cell .cal-mark{font-size:10px;line-height:1;margin-bottom:2px}
.cal-cell .cal-date{font-family:var(--mono);font-size:9px}

/* ── RECENT ARTICLES ─────────────────────────────────────────────────── */
.tabs{display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:6px 14px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;border-radius:var(--rs) var(--rs) 0 0}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);border-bottom-color:var(--gold)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.art-list{display:flex;flex-direction:column;gap:4px}
.art-item{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs)}
.art-num{width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--mono)}
.art-title{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.art-slug{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* ── WORKERS ─────────────────────────────────────────────────────────── */
.workers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:900px){.workers-grid{grid-template-columns:repeat(3,1fr)}}
.worker-wrap{display:flex;flex-direction:column;gap:6px}
.worker-btn{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);padding:14px 10px;text-align:center;color:var(--text);cursor:pointer;transition:.15s;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:var(--sans)}
.worker-btn:hover{border-color:var(--blue-dk);background:var(--s3)}
.worker-btn.running{border-color:var(--green);background:#f0fdf4;cursor:default}
.worker-btn.done{border-color:var(--blue);background:var(--blue-dim)}
.worker-btn.error{border-color:var(--red-dk);background:var(--red-dim)}
.worker-icon{font-size:20px;line-height:1}
.worker-lbl{font-size:11px;font-weight:600;color:var(--text2)}
.worker-sub{font-size:9px;color:var(--text3);font-family:var(--mono)}
.worker-prog{position:absolute;bottom:0;left:0;height:2px;background:var(--green);width:0;transition:width 20s linear}
.worker-res{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;font-size:10px;color:var(--text2);font-family:var(--mono);white-space:pre-wrap;max-height:80px;overflow-y:auto;display:none;line-height:1.5}
.worker-res.visible{display:block}

/* ── LOGS ────────────────────────────────────────────────────────────── */
.logs-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;padding:12px 14px}
.logs-header:hover .sec-title{color:var(--text2)}
.logs-chevron{font-size:11px;color:var(--text3);transition:transform .2s}
.logs-chevron.open{transform:rotate(90deg)}
.logs-body{display:none;padding:0 14px 14px}
.logs-body.open{display:block}
.log-filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.log-filter{background:var(--s2);border:1px solid var(--border);border-radius:3px;padding:3px 10px;font-size:10px;font-weight:600;color:var(--text3);cursor:pointer;transition:.1s;font-family:var(--sans)}
.log-filter:hover,.log-filter.active{color:var(--text2);border-color:var(--border2)}
.log-list{display:flex;flex-direction:column;gap:6px}
.log-item{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.log-item-hd{padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.log-item-hd:hover{background:var(--s3)}
.log-type-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.log-fname{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--text2)}
.log-type-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px}
.log-ts{font-size:10px;color:var(--text3);font-family:var(--mono);margin-left:auto;white-space:nowrap}
.log-chevron{color:var(--text3);font-size:10px;transition:transform .2s;flex-shrink:0}
.log-item.expanded .log-chevron{transform:rotate(90deg)}
.log-body{display:none;border-top:1px solid var(--border);padding:10px 12px}
.log-item.expanded .log-body{display:block}
.log-content{font-size:10px;font-family:var(--mono);color:var(--text2);white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;line-height:1.6;background:var(--bg);border-radius:4px;padding:10px}

/* ── SPINNER ─────────────────────────────────────────────────────────── */
.spin{display:flex;align-items:center;justify-content:center;padding:24px;gap:8px;color:var(--text3);font-size:12px}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ───────────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--s3);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 18px;font-size:12px;color:var(--text);opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;transform:none}
.toast.err{border-color:var(--red-dk);color:var(--red)}

/* ── 2-col layout for pipeline ───────────────────────────────────────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:800px){.two-col{grid-template-columns:1fr}.pipeline-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ─── SIDEBAR ─────────────────────────────────────────────────────────── -->
<nav class="sb">
  <div class="sb-logo">
    <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="1" width="7" height="7" rx="1.5" fill="white"/><rect x="10" y="1" width="7" height="7" rx="1.5" fill="white" opacity=".6"/><rect x="1" y="10" width="7" height="7" rx="1.5" fill="white" opacity=".6"/><rect x="10" y="10" width="7" height="7" rx="1.5" fill="#93c5fd"/></svg>
  </div>
  <ul class="sb-nav">
    <li class="sb-item active" id="nav-overview"><a href="#section-sites" onclick="setNav('overview')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="12" y="3" width="5" height="5" rx="1"/><rect x="3" y="12" width="5" height="5" rx="1"/><rect x="12" y="12" width="5" height="5" rx="1"/></svg>
    </a><span class="sb-tip">总览</span></li>
    <li class="sb-item" id="nav-sites"><a href="#section-sites" onclick="setNav('sites')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><ellipse cx="10" cy="10" rx="3" ry="7"/><line x1="3" y1="10" x2="17" y2="10"/></svg>
    </a><span class="sb-tip">站点</span></li>
    <li class="sb-item" id="nav-tasks"><a href="#section-timeline" onclick="setNav('tasks')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><polyline points="10,6 10,10 13,12"/></svg>
    </a><span class="sb-tip">任务</span></li>
    <li class="sb-item" id="nav-content"><a href="#section-pipeline" onclick="setNav('content')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h12M4 10h8M4 14h10"/></svg>
    </a><span class="sb-tip">内容</span></li>
    <li class="sb-item" id="nav-workers"><a href="#section-workers" onclick="setNav('workers')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="13,2 18,10 13,18 7,18 2,10 7,2"/></svg>
    </a><span class="sb-tip">Workers</span></li>
    <li class="sb-item" id="nav-logs"><a href="#section-logs" onclick="setNav('logs')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="3" width="12" height="14" rx="2"/><line x1="7" y1="8" x2="13" y2="8"/><line x1="7" y1="11" x2="13" y2="11"/><line x1="7" y1="14" x2="10" y2="14"/></svg>
    </a><span class="sb-tip">日志</span></li>
  </ul>
</nav>

<!-- ─── MAIN ─────────────────────────────────────────────────────────────── -->
<div class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="tb-stat" style="gap:4px">
      <div class="live-dot"></div>
      <div>
        <div class="tb-stat-lbl">今日 UV</div>
        <div class="tb-stat-val gold" id="tb-uv">—</div>
      </div>
    </div>
    <div class="tb-stat">
      <div>
        <div class="tb-stat-lbl">今日文章</div>
        <div class="tb-stat-val" id="tb-articles">—</div>
      </div>
    </div>
    <div class="tb-stat">
      <div>

'use strict';
// ─── State ────────────────────────────────────────────────────────────────────
let _data = null;

// ─── Scheduled tasks (hardcoded, status from API) ──────────────────────────
const SCHEDULE = [
  { id: 'generate-daily',    time: '06:00', label: 'Content Pipeline',        sub: 'generate-daily.js',   icon: '⬡' },
  { id: 'post-deploy-check', time: '08:00', label: 'Post-Deploy Check',        sub: '全站巡检 10 sites',  icon: '⬡', isNew: true },
  { id: 'daily',             time: '08:30', label: 'PM Daily Plan',            sub: 'scheduler daily',     icon: '⬡' },
  { id: 'buffer',            time: '09:00', label: 'Buffer Refill',            sub: 'Pinterest 队列补充',  icon: '⬡' },

  { id: 'auto-publish-flgh', time: '11:00', label: 'FreelancerGuideHub Publish',sub: 'auto-publish.js',   icon: '⬡' },
  { id: 'auto-publish-trh',  time: '12:00', label: 'ToolRankHQ Publish',      sub: 'auto-publish.js',     icon: '⬡' },
];

// ─── Workers ──────────────────────────────────────────────────────────────────
const WORKERS = [
  { id: 'daily',             label: 'PM Daily',    sub: '每天08:30',  icon: '📋', color: '#3b82f6' },
  { id: 'buffer',            label: 'Buffer',      sub: '每天09:00',  icon: '📌', color: '#f59e0b' },
  { id: 'auto-publish',      label: 'Insurance',   sub: '每天10:00',  icon: '✍️', color: '#3b82f6' },
  { id: 'auto-publish-flgh', label: 'Freelancer',  sub: '每天11:00',  icon: '✍️', color: '#22c55e' },
  { id: 'auto-publish-trh',  label: 'ToolRank',    sub: '每天12:00',  icon: '✍️', color: '#f59e0b' },
  { id: 'post-deploy-check', label: 'Deploy Check',sub: '每天08:00',  icon: '⚡', color: '#8b5cf6' },
  { id: 'monitor',           label: 'Monitor',     sub: '每4小时',    icon: '🔍', color: '#22c55e' },
  { id: 'recovery',          label: 'Recovery',    sub: '每30分钟',   icon: '🔧', color: '#ef4444' },
];

// ─── Clock ────────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('tb-clock').textContent = new Date().toLocaleString('zh-CN');
}
setInterval(updateClock, 1000); updateClock();

// ─── Nav ──────────────────────────────────────────────────────────────────────
function setNav(n) {
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + n);
  if (el) el.classList.add('active');
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3500);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false });
}

function fmtAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return '刚刚';
  if (m < 60) return `${m}m 前`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h 前`;
  return `${Math.floor(h/24)}d 前`;
}

function statusBadge(online) {
  if (online === true)  return '<span class="badge bg">● 200</span>';
  if (online === false) return '<span class="badge br">● 离线</span>';
  return '<span class="badge bgr">— 未知</span>';
}

function adsenseBadge(ads) {
  if (!ads) return '<span class="badge bgr">—</span>';
  if (ads.status === 'approved') return '<span class="badge bg">✓ 已通过</span>';
  if (ads.status === 'skip')     return '<span class="badge bgr">跳过</span>';
  if (!ads.submitted)            return '<span class="badge bgr">未提交</span>';
  const cls = ads.days > 14 ? 'br' : 'by';
  return `<span class="badge ${cls}">审核中 ${ads.days}天</span>`;
}

function bool2badge(v, y, n, u='—') {
  if (v === true)  return `<span class="badge bg">${y}</span>`;
  if (v === false) return `<span class="badge br">${n}</span>`;
  return `<span class="badge bgr">${u}</span>`;
}

// ─── Topbar update ────────────────────────────────────────────────────────────
function updateTopbar(data) {
  // sites online
  const online = data.sites.filter(s => s.health.online === true).length;
  const total  = data.sites.length;
  document.getElementById('tb-sites').textContent = `${online}/${total}`;
  document.getElementById('tb-sites').style.color = online < total ? 'var(--yellow)' : 'var(--text)';

  // articles today (by checking recentArticles that could be from today)
  const today = data.today;
  let artCount = 0;
  const ra = data.recentArticles || {};
  // count slugs whose file was recently modified (API doesn't give date directly, estimate)
  artCount = 0; // placeholder, update if API provides
  document.getElementById('tb-articles').textContent = artCount || '—';

  // alerts (from todos high/medium)
  const alerts = (data.todos || []).filter(t => t.level === 'high' || t.level === 'medium');
  const alertCount = alerts.filter(t => !_dismissed.has(JSON.stringify(t.text))).length;
  document.getElementById('tb-alerts').textContent = alertCount;
  const badge = document.getElementById('tb-alert-badge');
  if (alertCount > 0) {
    badge.style.display = '';
    badge.textContent = alertCount;
  } else {
    badge.style.display = 'none';
  }
}

// ─── Alerts ───────────────────────────────────────────────────────────────────
function renderAlerts(todos) {
  const items = (todos || [])
    .filter(t => t.level === 'high' || t.level === 'medium')
    .filter(t => !_dismissed.has(t.text));

  const panel = document.getElementById('alerts');
  if (!items.length) { panel.classList.remove('visible'); return; }
  panel.classList.add('visible');

  document.getElementById('alert-count').textContent = items.length;
  document.getElementById('alerts-list').innerHTML = items.map(t => `
<div class="alert-item" id="alrt-${esc(btoa(t.text||'').slice(0,20))}">
  <span class="alert-sev ${t.level}">${t.level === 'high' ? '高危' : '中级'}</span>
  <div class="alert-body">${esc(t.text)}</div>
  <button class="alert-dm" onclick="dismissAlert('${esc(t.text)}')">✓</button>
</div>`).join('');
}

function dismissAlert(text) {
  _dismissed.add(text);
  localStorage.setItem('dash-dismissed', JSON.stringify([..._dismissed]));
  renderAlerts((_data?.todos || []));
  updateTopbar(_data);
}

function dismissAll() {
  (_data?.todos || []).forEach(t => _dismissed.add(t.text));
  localStorage.setItem('dash-dismissed', JSON.stringify([..._dismissed]));
  renderAlerts([]);
  updateTopbar(_data);
}

// ─── Sites table ──────────────────────────────────────────────────────────────
function renderSites(sites) {
  const online = sites.filter(s => s.health.online === true).length;
  document.getElementById('sites-online-label').textContent = `${online}/${sites.length} 在线`;

  document.getElementById('sites-tbody').innerHTML = sites.map(s => {
    const lastDeploy = s.lastPublishTime
      ? `<div class="last-deploy">${fmtAgo(s.lastPublishTime)}</div>${s.lastPublish ? `<div style="font-size:9px;color:var(--text3);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px">${esc(s.lastPublish)}</div>` : ''}`
      : '<span class="deploy-na">—</span>';

    return `<tr>
      <td>
        <div class="site-name-cell">
          <div class="site-color-dot" style="background:${esc(s.color)};box-shadow:0 0 6px ${esc(s.color)}66"></div>
          <div>
            <div class="site-name">${esc(s.name)}</div>
            <div class="site-domain">${esc(s.domain)}</div>
          </div>
        </div>
      </td>
      <td>${statusBadge(s.health.online)}</td>
      <td>${adsenseBadge(s.adsense)}</td>
      <td>${bool2badge(s.ga.connected,'✓ 已连','✗ 未连')}</td>
      <td>${bool2badge(s.health.ads_txt,'✓ OK','✗ 缺失')}</td>
      <td>${lastDeploy}</td>
    </tr>`;
  }).join('');

// ─── Timeline ─────────────────────────────────────────────────────────────────
function renderTimeline(apiTl) {
  const now = new Date();
  const todayHHMM = now.getHours() * 60 + now.getMinutes();
  document.getElementById('tl-date').textContent = now.toLocaleDateString('zh-CN');

  const tlMap = {};
  (apiTl || []).forEach(t => { tlMap[t.id] = t; });

  document.getElementById('timeline').innerHTML = SCHEDULE.map((task, i) => {
    const api = tlMap[task.id];
    const ok  = api?.success;
    const [h, m] = task.time.split(':').map(Number);
    const taskMin = h * 60 + m;
    const isPast  = todayHHMM > taskMin + 5;

    let dotCls = '';
    if (api) dotCls = ok ? 'ok' : 'fail';
    else if (task.isNew) dotCls = 'new';

    const stBadge = ok === true
      ? '<span class="badge bg">✓ 成功</span>'
      : ok === false
        ? '<span class="badge br">✗ 失败</span>'
        : isPast
          ? '<span class="badge by">? 待核查</span>'
          : '<span class="badge bgr">待执行</span>';

    const isLast = i === SCHEDULE.length - 1;
    return `
<div class="tl-row">
  <div class="tl-time">${esc(task.time)}</div>
  <div class="tl-spine">
    <div class="tl-dot ${dotCls}"></div>
    ${!isLast ? '<div class="tl-conn"></div>' : ''}
  </div>
  <div class="tl-body">
    <div class="tl-label">
      ${esc(task.label)}
      ${task.isNew ? '<span class="tl-new">NEW</span>' : ''}
    </div>
    <div class="tl-meta">
      ${stBadge}
      ${api?.lastRun ? `<span class="tl-ts">上次: ${fmtTime(api.lastRun)}</span>` : ''}
      <span class="tl-file">${esc(task.sub)}</span>
      ${api?.file ? `<span class="tl-file" style="opacity:.6">${esc(api.file)}</span>` : ''}
    </div>
  </div>
</div>`;
  }).join('');
}

// ─── Content Pipeline ─────────────────────────────────────────────────────────
function renderPipeline(cp, ra) {
  const sites = [
    { key: 'insurancetipspro', label: 'InsuranceTipsPro', color: '#3b82f6',
      used: (ra.insurancetipspro||[]).length, max: TOPIC_MAX.insurancetipspro },
    { key: 'freelancerguidehub', label: 'FreelancerGuideHub', color: '#22c55e',
      used: (ra.freelancerguidehub||[]).length, max: TOPIC_MAX.freelancerguidehub },
  ];

  document.getElementById('pipeline-content').innerHTML = `
<div class="pipeline-grid">
${sites.map(s => {
  const remaining = s.max - s.used;
  const pct = Math.round(s.used / s.max * 100);
  const warn = remaining < 15;

  return `<div class="pipeline-site" style="border-left:2px solid ${s.color}33">
    <div class="pipeline-site-name">
      <div style="width:6px;height:6px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
      ${esc(s.label)}
      ${warn ? '<span class="warn-badge">⚠ 不足15</span>' : ''}
    </div>
    <div class="pipeline-nums">${remaining}<span> 剩余 / ${s.max}</span></div>
    <div class="pipeline-sub">已用 ${s.used} 个选题</div>
    <div class="pbar"><div class="pbar-fill ${barCls}" style="width:${pct}%"></div></div>
  </div>`;
}).join('')}
</div>
${cp ? `<div style="margin-top:14px;padding:10px 12px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs)">
  <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Content Pipeline (content-pipeline/)</div>
  <div style="font-family:var(--mono);font-size:13px;color:var(--gold)">${cp.remaining}<span style="font-size:11px;color:var(--text3)"> / ${cp.total} 剩余</span></div>

  const days = cp?.recentDays || [];
  document.getElementById('cal-grid').innerHTML = days.map((d, i) => {
    const cls = ['cal-cell', d.hasOutput ? 'on' : '', i === 0 ? 'today' : ''].filter(Boolean).join(' ');
    return `<div class="${cls}" title="${esc(d.topic||d.date||'')}">
      <span class="cal-mark">${d.hasOutput ? '✓' : '·'}</span>
      <span class="cal-date">${(d.date||'').slice(5)}</span>
    </div>`;
  }).join('');
}

// ─── Recent Articles ──────────────────────────────────────────────────────────

</div>`).join('');
  }

// ─── Workers ──────────────────────────────────────────────────────────────────
function renderWorkers() {
  document.getElementById('workers-grid').innerHTML = WORKERS.map(w => `
<div class="worker-wrap">
  <button class="worker-btn" id="wbtn-${w.id}" onclick="runWorker('${w.id}')">
    <div class="worker-prog" id="wprog-${w.id}"></div>
    <span class="worker-icon">${w.icon}</span>
    <span class="worker-lbl">${esc(w.label)}</span>
    <span class="worker-sub">${esc(w.sub)}</span>
  </button>
  <div class="worker-res" id="wres-${w.id}"></div>
</div>`).join('');
}

async function runWorker(id) {
  const btn  = document.getElementById(`wbtn-${id}`);
  const prog = document.getElementById(`wprog-${id}`);
  const res  = document.getElementById(`wres-${id}`);
  if (!btn || btn.classList.contains('running')) return;

  btn.classList.add('running');
  btn.querySelector('.worker-lbl').textContent = '执行中…';
  prog.style.width = '0%';
  setTimeout(() => prog.style.width = '90%', 100);
  res.textContent = ''; res.classList.remove('visible');

  const w = WORKERS.find(x => x.id === id);
  toast(`▶ 已触发 ${w?.label || id}，后台运行中…`);

  try {
    const r = await fetch(`/api/run/${id}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);

    setTimeout(async () => {
      prog.style.width = '100%';
      btn.classList.remove('running'); btn.classList.add('done');
      btn.querySelector('.worker-lbl').textContent = '✓ 完成';
      toast(`✓ ${w?.label || id} 已完成`);

      await loadLogs();
      const log = _logs.find(l => l.file && l.file.toLowerCase().includes(id.replace('-','').toLowerCase()));
      const summary = log?.output ? log.output.slice(0, 200) : '执行完成，请查看日志';
      res.textContent = summary; res.classList.add('visible');

      setTimeout(() => {
        btn.classList.remove('done');
        btn.querySelector('.worker-lbl').textContent = w?.label || id;
        prog.style.width = '0%'; res.classList.remove('visible');
      }, 10000);
    }, 4000);
  } catch (e) {
    btn.classList.remove('running'); btn.classList.add('error');
    btn.querySelector('.worker-lbl').textContent = '✗ 失败';
    prog.style.width = '0%';
    res.textContent = e.message; res.classList.add('visible');
    toast(`触发失败: ${e.message}`, true);
    setTimeout(() => {
      btn.classList.remove('error');
      btn.querySelector('.worker-lbl').textContent = w?.label || id;
      res.classList.remove('visible');
    }, 6000);
  }
}

// ─── Logs ─────────────────────────────────────────────────────────────────────
function toggleLogs() {
  const body = document.getElementById('logs-body');
  const chev = document.getElementById('logs-chevron');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

async function loadLogs() {
  try {
    const res = await fetch('/api/logs');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    _logs = await res.json();
  } catch (_) {
    _logs = [];
  }
  renderLogs();
}

function filterLog(type, btn) {
  _logFilter = type;
  document.querySelectorAll('.log-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLogs();
}

function logType(fname) {
  if (!fname) return 'other';
  if (fname.includes('post-deploy')) return 'post-deploy';
  if (fname.includes('auto-publish')) return 'auto-publish';
  if (fname.includes('buffer')) return 'buffer';
  if (fname.includes('monitor')) return 'monitor';
  if (fname.includes('cron')) return 'cron';
  if (fname.includes('recovery')) return 'recovery';
  return 'other';
}

const LOG_META = {
  'post-deploy':  { dot: '#7c3aed', badge: '#ede9fe', bgtxt: '#5b21b6', label: 'Deploy' },
  'auto-publish': { dot: '#16a34a', badge: '#dcfce7', bgtxt: '#15803d', label: 'Publish' },
  'buffer':       { dot: '#d97706', badge: '#fef3c7', bgtxt: '#b45309', label: 'Buffer' },
  'monitor':      { dot: '#2563eb', badge: '#dbeafe', bgtxt: '#1d4ed8', label: 'Monitor' },
  'cron':         { dot: '#64748b', badge: '#f1f5f9', bgtxt: '#475569', label: 'Cron' },
  'recovery':     { dot: '#dc2626', badge: '#fee2e2', bgtxt: '#b91c1c', label: 'Recovery' },
  'other':        { dot: '#94a3b8', badge: '#f0f4f8', bgtxt: '#64748b', label: 'Log' },
};

function renderLogs() {
  const list = document.getElementById('log-list');
  document.getElementById('logs-count').textContent = `${_logs.length} 条`;

  if (!_logs.length) {
    list.innerHTML = '<div class="spin" style="color:var(--text3)">暂无日志 (需 /api/logs 端点)</div>';
    return;
  }

  let filtered = _logs;
  if (_logFilter !== 'all') {
    filtered = _logs.filter(l => logType(l.file) === _logFilter);
  }

  if (!filtered.length) {
    list.innerHTML = '<div class="spin" style="color:var(--text3)">无匹配日志</div>';
    return;
  }

  list.innerHTML = filtered.slice(0, 30).map((l, idx) => {
    const type = logType(l.file);
    const meta = LOG_META[type] || LOG_META.other;
    const time = l.timestamp ? fmtTime(l.timestamp) : '—';
    const content = l.output || (typeof l === 'string' ? l : JSON.stringify(l, null, 2));
    return `<div class="log-item" id="li-${idx}">
  <div class="log-item-hd" onclick="toggleLogItem(${idx})">
    <div class="log-type-dot" style="background:${meta.dot}"></div>
    <span class="log-fname">${esc(l.file||'unknown')}</span>
    <span class="log-type-badge" style="background:${meta.badge};color:${meta.bgtxt}">${meta.label}</span>
    <span class="log-ts">${time}</span>
    <span class="log-chevron">›</span>
  </div>
  <div class="log-body">
    <div class="log-content">${esc(String(content).slice(0, 4000))}</div>
  </div>
</div>`;
  }).join('');
}

function toggleLogItem(idx) {
  document.getElementById(`li-${idx}`)?.classList.toggle('expanded');
}

// ─── Main load ────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('/api/status');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    _data = await res.json();

    updateTopbar(_data);
    renderAlerts(_data.todos);
    renderSites(_data.sites);
    renderTimeline(_data.timeline);
    renderPipeline(_data.contentPipeline, _data.recentArticles);
    renderArticles(_data.recentArticles || {});
  } catch (e) {
    toast(`加载失败: ${e.message}`, true);
    console.error('loadData error:', e);
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderWorkers();
loadData();
loadLogs();
setInterval(loadData, 60000);
setInterval(loadLogs, 30000);
</script>
