<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID Generator — Free Online UUID v4 Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #f4f5f7;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .page-wrap { display: flex; flex: 1; max-width: 1280px; margin: 0 auto; width: 100%; }
  .main-area { flex: 1; min-width: 0; padding: 32px 24px 48px; }
  .sidebar { width: 200px; flex-shrink: 0; padding: 32px 16px; }
  header { text-align: center; margin-bottom: 16px; }
  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.3px; }
  header p { color: #555; font-size: 15px; margin-top: 4px; }
  .ad-slot { position: relative; background: #e8e9ed; border: 1px dashed #bbb; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #888; font-size: 13px; }
  .ad-top { width: 100%; height: 90px; margin-bottom: 24px; }
  .ad-side { width: 100%; min-height: 300px; margin-bottom: 16px; }
  .ad-label { position: absolute; top: 6px; left: 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 6px rgba(0,0,0,.04); padding: 28px 32px 32px; }
  .options-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
  .field { flex: 1; min-width: 100px; }
  .field label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #555; text-transform: uppercase; letter-spacing: .3px; }
  .field input, .field select { width: 100%; padding: 10px 14px; font-size: 15px; font-weight: 600; border: 1.5px solid #d0d5dd; border-radius: 8px; outline: none; transition: border-color .2s, box-shadow .2s; }
  .field input:focus, .field select:focus { border-color: #5b5bd6; box-shadow: 0 0 0 3px rgba(91,91,214,.15); }
  .field select { appearance: auto; }
  .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 11px 32px; font-size: 15px; font-weight: 600; color: #fff; background: #5b5bd6; border: none; border-radius: 8px; cursor: pointer; transition: background .2s, transform .1s; }
  .btn-primary:hover { background: #4a4ac2; }
  .btn-primary:active { transform: scale(.97); }
  .btn-secondary { display: inline-flex; align-items: center; gap: 6px; padding: 11px 22px; font-size: 14px; font-weight: 600; color: #555; background: #f0f0f5; border: 1.5px solid #d0d5dd; border-radius: 8px; cursor: pointer; transition: background .15s, color .15s; }
  .btn-secondary:hover { background: #e4e4ef; color: #1a1a2e; }
  .btn-secondary.copied { background: #d4edda; border-color: #8cc99c; color: #155724; }
  .btn-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .result-area { border-top: 1.5px solid #e8e9ed; padding-top: 18px; }
  .uuid-list { display: flex; flex-direction: column; gap: 8px; }
  .uuid-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f8f8ff; border: 1.5px solid #e0dffc; border-radius: 8px; }
  .uuid-item .uuid-text { flex: 1; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 14px; font-weight: 600; color: #1a1a2e; word-break: break-all; min-width: 0; }
  .uuid-item .copy-uuid { flex-shrink: 0; padding: 5px 12px; font-size: 12px; font-weight: 600; color: #555; background: #f0f0f5; border: 1px solid #d0d5dd; border-radius: 6px; cursor: pointer; transition: background .15s, color .15s; }
  .uuid-item .copy-uuid:hover { background: #e4e4ef; color: #1a1a2e; }
  .uuid-item .copy-uuid.copied { background: #d4edda; border-color: #8cc99c; color: #155724; }
  .empty-state { text-align: center; padding: 30px 0; color: #ccc; font-size: 14px; }
  .empty-state svg { display: block; margin: 0 auto 10px; opacity: .35; }
  footer { text-align: center; padding: 24px 16px 32px; font-size: 13px; color: #999; }
  @media (max-width: 820px) { .sidebar { display: none; } .main-area { padding: 20px 16px 36px; } .card { padding: 20px; } }
  @media (max-width: 600px) { header h1 { font-size: 22px; } .btn-primary, .btn-secondary { width: 100%; justify-content: center; } .btn-row { flex-direction: column; align-items: stretch; } .uuid-item { flex-wrap: wrap; } .uuid-item .uuid-text { width: 100%; } }
.navbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 24px;background:#fff;border-bottom:1.5px solid #e8e9ed;flex-shrink:0}.navbar .logo{font-size:18px;font-weight:800;color:#5b5bd6;text-decoration:none;letter-spacing:-.3px}.navbar .nav-all{font-size:13px;font-weight:600;color:#5b5bd6;text-decoration:none;padding:6px 14px;border:1.5px solid #5b5bd6;border-radius:6px;transition:background .2s,color .2s}.navbar .nav-all:hover{background:#5b5bd6;color:#fff}</style>
</head>
<body>
<nav class="navbar"><a class="logo" href="/">WordCaseFix</a><a class="nav-all" href="/">All Tools</a></nav>
<div class="ad-slot ad-top"><span class="ad-label">Advertisement</span></div>
<div class="page-wrap">
  <main class="main-area">
    <header><h1>UUID Generator</h1><p>Generate UUID v4 (random) identifiers instantly.</p></header>
    <div class="ad-slot ad-top" style="height:70px;margin-bottom:20px;"><span class="ad-label">Advertisement</span></div>
    <div class="card">
      <div class="options-row">
        <div class="field"><label for="uuidCount">Count</label><input type="number" id="uuidCount" value="1" min="1" max="100"></div>
        <div class="field"><label for="uuidCase">Case</label><select id="uuidCase"><option value="lower">lowercase</option><option value="upper">UPPERCASE</option></select></div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="generateBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.9-3.3L23 10M1 14l4.6 4.3A9 9 0 0 0 20.5 15"/></svg> Generate</button>
        <button class="btn-secondary" id="copyAllBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy All</button>
      </div>
      <div class="result-area" id="resultArea">
        <div class="empty-state" id="emptyState"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><p>Click <strong>Generate</strong> to create UUIDs.</p></div>
        <div class="uuid-list" id="uuidList"></div>
      </div>
    </div>
  </main>
  <aside class="sidebar">
    <div class="ad-slot ad-side"><span class="ad-label">Advertisement</span></div>
    <div class="ad-slot ad-side" style="min-height:250px;"><span class="ad-label">Advertisement</span></div>
  </aside>
</div>
<footer>UUID Generator &mdash; Free online UUID v4 generator</footer>
<script>
(function() {
  const uuidCount = document.getElementById('uuidCount');
  const uuidCase = document.getElementById('uuidCase');
  const generateBtn = document.getElementById('generateBtn');
  const copyAllBtn = document.getElementById('copyAllBtn');
  const emptyState = document.getElementById('emptyState');
  const uuidList = document.getElementById('uuidList');

  function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  function generate() {
    let count = parseInt(uuidCount.value, 10);
    if (isNaN(count) || count < 1) count = 1;
    if (count > 100) count = 100;

    const useUpper = uuidCase.value === 'upper';

    const uuids = [];
    for (let i = 0; i < count; i++) {
      let u = generateUUID();
      if (useUpper) u = u.toUpperCase();
      uuids.push(u);
    }

    emptyState.style.display = 'none';
    let html = '';
    for (const u of uuids) {
      const escaped = u.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html += '<div class="uuid-item"><span class="uuid-text">' + escaped + '</span><button class="copy-uuid" data-text="' + escaped.replace(/'/g,'&#39;') + '">Copy</button></div>';
    }
    uuidList.innerHTML = html;

    // Per-row copy
    uuidList.querySelectorAll('.copy-uuid').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const raw = this.getAttribute('data-text').replace(/&#39;/g, "'");
        navigator.clipboard.writeText(raw).then(function() {
          const orig = this.innerHTML;
          this.innerHTML = 'Copied!';
          this.classList.add('copied');
          setTimeout(function() { this.innerHTML = orig; this.classList.remove('copied'); }.bind(this), 1500);
        }.bind(this));
      });
    });
  }

  generateBtn.addEventListener('click', generate);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') generate();
  });

  copyAllBtn.addEventListener('click', function() {
    const items = uuidList.querySelectorAll('.uuid-text');
    if (items.length === 0) return;
    const text = Array.from(items).map(el => el.textContent).join('\n');
    navigator.clipboard.writeText(text).then(function() {
      const orig = copyAllBtn.innerHTML;
      copyAllBtn.innerHTML = 'Copied!';
      copyAllBtn.classList.add('copied');
      setTimeout(function() { copyAllBtn.innerHTML = orig; copyAllBtn.classList.remove('copied'); }, 1800);
    });
  });

  generate();
})();
</script>
</body>
</html>
