<!DOCTYPE html>
﻿<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SW_TEST_DUPE</title>
<style>
.btn-start, .btn-stop, .btn-reset, .btn-lap { padding: 12px 32px; font-size: 15px; cursor: pointer; }
.btn-start { background: #22c55e; color: #fff; }
.btn-stop { background: #ef4444; color: #fff; }
.btn-reset { background: #f0f0f5; color: #555; }
.btn-lap { background: #5b5bd6; color: #fff; }
.btn-start:disabled, .btn-stop:disabled, .btn-lap:disabled { opacity: .4; }
.card { background: #fff; border-radius: 12px; padding: 28px 32px; }
</style>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
<button id="startBtn">Start</button>
<button id="stopBtn" disabled>Stop</button>
<button id="lapBtn" disabled>Lap</button>
<button id="resetBtn">Reset</button>
<div id="timerDisplay">00:00:00<span class="ms">.00</span></div>
<div id="lapsList"></div>
<div id="lapCount">0 laps</div>

<script>
(function(){
  var timerDisplay = document.getElementById('timerDisplay');
  var startBtn = document.getElementById('startBtn');
  var stopBtn = document.getElementById('stopBtn');
  var lapBtn = document.getElementById('lapBtn');
  var resetBtn = document.getElementById('resetBtn');
  var lapsList = document.getElementById('lapsList');
  var lapCount = document.getElementById('lapCount');
  var startTime = 0, elapsed = 0, running = false, timerInterval = null;
  var laps = [], lastLapTime = 0;

  function formatTime(ms){
    var totalMs = Math.floor(ms);
    var minutes = Math.floor(totalMs / 60000);
    var seconds = Math.floor((totalMs % 60000) / 1000);
    var centiseconds = Math.floor((totalMs % 1000) / 10);
    return String(minutes).padStart(2,'0') + ':' + String(seconds).padStart(2,'0') + '.<span class="ms">' + String(centiseconds).padStart(2,'0') + '</span>';
  }

  function start(){
    if(running) return;
    running = true;
    startTime = Date.now();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    lapBtn.disabled = false;
    timerDisplay.classList.add('running');
  }

  function stop(){
    if(!running) return;
    running = false;
    elapsed += Date.now() - startTime;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    lapBtn.disabled = true;
    timerDisplay.classList.remove('running');
  }

  function reset(){
    running = false;
    elapsed = 0;
    startTime = 0;
    lastLapTime = 0;
    laps = [];
    startBtn.disabled = false;
    stopBtn.disabled = true;
    lapBtn.disabled = true;
    timerDisplay.classList.remove('running');
    timerDisplay.innerHTML = formatTime(0);
    renderLaps();
  }

  function recordLap(){
    if(!running) return;
    var now = Date.now();
    var totalElapsed = elapsed + (now - startTime);
    var lapElapsed = laps.length === 0 ? totalElapsed : totalElapsed - lastLapTime;
    laps.push({ total: totalElapsed, diff: lapElapsed });
    lastLapTime = totalElapsed;
    renderLaps();
  }

  function renderLaps(){
    if(laps.length === 0){
      lapsList.innerHTML = '<div>No laps</div>';
      lapCount.textContent = '0 laps';
      return;
    }
    var html = '';
    for(var i = laps.length - 1; i >= 0; i--){
      html += '<div>Lap ' + (i+1) + ': ' + formatTime(laps[i].total).replace(/<[^>]*>/g,'') + '</div>';
    }
    lapsList.innerHTML = html;
    lapCount.textContent = laps.length + ' laps';
  }

  startBtn.addEventListener('click', start);
  stopBtn.addEventListener('click', stop);
  resetBtn.addEventListener('click', reset);
  lapBtn.addEventListener('click', recordLap);

  // Quick test
  var results = [];
  results.push('init=' + (!!startBtn && !!stopBtn && !!lapBtn && !!resetBtn));
  results.push('ids=' + startBtn.id + ',' + stopBtn.id + ',' + lapBtn.id + ',' + resetBtn.id);
  startBtn.click();
  results.push('start_running=' + running);
  results.push('start_disabled=' + startBtn.disabled);
  stopBtn.click();
  results.push('stop_running=' + running);
  resetBtn.click();
  results.push('reset_running=' + running);
  document.title = 'RESULT_DUPE: ' + results.join(' | ');
})();
</script>
</body>
</html>
